      const srcStd = raw.std || raw.a;
      if (srcStd && typeof srcStd === 'object') {
        Object.keys(srcStd).forEach(k => {
          const idx = +k;
          if (!Number.isInteger(idx) || idx < 0 || idx >= STANDARD_ZONE_COUNT) return;
          std[idx] = sanitizeZoneEntry(srcStd[k], idx);
        });
      }
      for (let i = 0; i < STANDARD_ZONE_COUNT; i++) {
        if (!std[i]) std[i] = emptyZoneEntry();
      }
      const custom = (Array.isArray(raw.custom) ? raw.custom : Array.isArray(raw.c) ? raw.c : [])
        .map(row => Array.isArray(row) ? compactRowToCustomZone(row) : sanitizeCustomZoneRecord(row))
        .filter(Boolean)
        .slice(0, PROFILE_LIMITS.maxCustomZones);
      const out = { v: 3, std, custom };
      if (keepUi && raw.ui && typeof raw.ui === 'object') {
        const ci = Number(raw.ui.curIdx);
        if (Number.isInteger(ci) && ci >= 0) out.ui = { curIdx: ci };
      }
      return out;
    }

    function compactRowToCustomZone(row) {
      const [id, name, x, y, r1, r2, chunk] = row || [];
      return sanitizeCustomZoneRecord({
        id,
        name,
        x,
        y,
        r1,
        r2,
        d: expandCompactZoneEntry(chunk, 0)
      });
    }

    function compactZoneEntry(entry) {
      const e = entry || emptyZoneEntry();
      return [
        e.persons.map(p => {
          let ci = Number(p.colorIdx);
          if (!Number.isInteger(ci) || ci < 0 || ci >= PERSON_COLORS.length) {
            ci = PERSON_COLORS.indexOf(p.color);
            if (ci < 0) ci = PERSON_DEFAULT_IDX;
          }
          return ci === PERSON_DEFAULT_IDX ? [p.lat, p.lng] : [p.lat, p.lng, ci];
        }),
        e.labels.map(lb => {
          const fp = Math.round(lb.fontPx || 14);
          const row = [lb.lat, lb.lng, lb.text, lb.color];
          if (fp !== 14) row.push(fp);
          return row;
        }),
        e.climbs.map(c => [c.lat, c.lng, c.url])
      ];
    }

    function expandCompactZoneEntry(chunk, zoneIdx) {
      if (!Array.isArray(chunk) || chunk.length < 3) return emptyZoneEntry();
      const [personsRaw, labelsRaw, climbsRaw] = chunk;
      return sanitizeZoneEntry({
        persons: (Array.isArray(personsRaw) ? personsRaw : []).map(row => {
          const [lat, lng, colorIdx] = row || [];
          return { lat, lng, colorIdx: colorIdx != null ? colorIdx : PERSON_DEFAULT_IDX };
        }),
        labels: (Array.isArray(labelsRaw) ? labelsRaw : []).map(row => {
          const [lat, lng, text, color, fontPx] = row || [];
          return fontPx != null ? { lat, lng, text, color, fontPx } : { lat, lng, text, color };
        }),
        climbs: (Array.isArray(climbsRaw) ? climbsRaw : []).map(row => {
          const [lat, lng, url] = row || [];
          return { lat, lng, url };
        })
      }, zoneIdx);
    }

    function profileToCompact(payload) {
      const safe = sanitizeProfilePayload(payload, false);
      const a = {};
      for (let i = 0; i < STANDARD_ZONE_COUNT; i++) {
        a[i] = compactZoneEntry(safe.std[i] ?? safe.std[String(i)]);
      }
      return {
        v: 3,
        a,
        c: (safe.custom || []).map(cz => [
          cz.id,
          cz.name,
          cz.x,
          cz.y,
          cz.r1,
          cz.r2,
          compactZoneEntry(cz.d)
        ])
      };
    }

    function compactToProfile(raw) {
      if (!raw || typeof raw !== 'object') throw new Error('Неверный компактный профиль');
      if (raw.v === 3) {
        const std = {};
        const srcA = raw.a || {};
        Object.keys(srcA).forEach(k => {
          const idx = +k;
          if (!Number.isInteger(idx) || idx < 0 || idx >= STANDARD_ZONE_COUNT) return;
          std[idx] = expandCompactZoneEntry(srcA[k], idx);
        });
        for (let i = 0; i < STANDARD_ZONE_COUNT; i++) {
          if (!std[i]) std[i] = emptyZoneEntry();
        }
        const custom = (Array.isArray(raw.c) ? raw.c : [])
          .map(compactRowToCustomZone)
          .filter(Boolean)
          .slice(0, PROFILE_LIMITS.maxCustomZones);
        return sanitizeProfilePayload({ v: 3, std, custom }, true);
      }
      if (raw.v === 2) return migrateLegacyToV3(raw, true);
      throw new Error('Неверный компактный профиль');
    }

    // ═══════ LABELS (Photoshop-style inline) ═══════
    let textEditSession = null;
    const inlineInput = () => document.getElementById('inlineTextInput');
    let _labelMeasureCtx = null;

    function measureLabelText(text, fontSizePx) {
      if (!_labelMeasureCtx) {
        _labelMeasureCtx = document.createElement('canvas').getContext('2d');
      }
      _labelMeasureCtx.font = `700 ${fontSizePx}px Satoshi, system-ui, sans-serif`;
      return _labelMeasureCtx.measureText(text || ' ').width;
    }

    function labelPxDefault() {
      return +document.getElementById('labelSize').value || 14;
    }

    function labelWorldSizeFromSlider(px, lat) {
      const latVal = lat ?? ZONES[curIdx]?.x ?? 0;
      const ppm = getPxPerUnitAtZoom(LABEL_REF_ZOOM, latVal);
      return px / ppm;
    }

    function labelSliderPxForLabel(lb) {
      const lat = lb.lat ?? ZONES[curIdx]?.x ?? 0;
      const ppm = getPxPerUnitAtZoom(LABEL_REF_ZOOM, lat);
      return Math.max(8, Math.round(getLabelWorldSize(lb) * ppm));
    }

    function getLabelWorldSize(lb) {
      if (lb.fontPx != null) return labelWorldSizeFromSlider(lb.fontPx, lb.lat);
      if (lb.sizeWorld != null) return lb.sizeWorld;
      if (lb.size != null) return labelWorldSizeFromSlider(lb.size, lb.lat);
      return labelWorldSizeFromSlider(labelPxDefault(), lb.lat);
    }

    function labelFontPx(lb) {
      const lat = lb.lat ?? ZONES[curIdx]?.x ?? 0;
      const ppm = getPxPerUnitAtZoom(map.getZoom(), lat);
      return Math.max(8, getLabelWorldSize(lb) * ppm);
    }

    function applyLabelSizeFromSlider(lb, px) {
      lb.fontPx = px;
      lb.sizeWorld = labelWorldSizeFromSlider(px, lb.lat);
      delete lb.size;
    }

    function buildLabelHtml(lb) {
      if (textEditSession && textEditSession.lb === lb) {
        return `<div class="map-label-wrap editing"></div>`;
      }
      const fs = labelFontPx(lb);
      const dragCls = currentTool === 'label' ? ' drag-mode' : '';
      const delBtn = currentTool === 'label'
        ? `<button class="map-label-del" type="button" title="Удалить">✕</button>`
        : '';
      return `<div class="map-label-wrap${dragCls}" style="color:${sanitizeColor(lb.color, '#ffff00')};font-size:${fs}px">
        <span class="map-label-body">${esc(lb.text || '')}</span>
        ${delBtn}
      </div>`;
    }

    function updateLabelOptsVisibility() {
      const show = currentTool === 'label' || !!textEditSession;
      document.getElementById('labelOpts').classList.toggle('visible', show);
    }

    function positionInlineInput(lb) {
      const inp = inlineInput();
      if (!inp) return;
      const cp = map.latLngToContainerPoint(L.latLng(lb.lat, lb.lng));
      const fs = labelFontPx(lb);
      inp.style.display = 'block';
      inp.style.left = cp.x + 'px';
      inp.style.top = cp.y + 'px';
      inp.style.fontSize = fs + 'px';
      inp.style.color = lb.color;
      const w = Math.ceil(measureLabelText(inp.value, fs)) + 14;
      inp.style.width = Math.max(32, w) + 'px';
    }

    function findLabelAt(ll) {
      const clickPt = map.latLngToContainerPoint(ll);
      const labels = zoneData[curIdx]?.labels || [];
      let hit = null, bestArea = Infinity;
      for (const lb of labels) {
        if (textEditSession && textEditSession.lb === lb) continue;
        const cp = map.latLngToContainerPoint(L.latLng(lb.lat, lb.lng));
        const fs = labelFontPx(lb);
        const w = measureLabelText(lb.text || 'M', fs) + 10;
        const h = fs * 1.35 + 6;
        if (clickPt.x >= cp.x && clickPt.x <= cp.x + w &&
          clickPt.y >= cp.y && clickPt.y <= cp.y + h) {
          const area = w * h;
          if (area < bestArea) { hit = lb; bestArea = area; }
        }
      }
      return hit;
    }

    function syncLabelFromInput() {
      if (!textEditSession) return;
      const lb = textEditSession.lb;
      const inp = inlineInput();
      lb.text = inp.value;
      lb.color = document.getElementById('labelColor').value;
      applyLabelSizeFromSlider(lb, labelPxDefault());
      positionInlineInput(lb);
    }

    function startTextEdit(lb, isNew) {
      if (textEditSession && textEditSession.lb !== lb) commitTextEdit();
      if (currentTool !== 'label') setTool('label');
      textEditSession = { lb, isNew, startText: lb.text || '' };
      document.getElementById('labelColor').value = lb.color || '#ffff00';
      const sliderPx = lb.fontPx != null ? lb.fontPx : labelSliderPxForLabel(lb);
      document.getElementById('labelSize').value = sliderPx;
      document.getElementById('labelSizeVal').textContent = sliderPx;
      if (isNew) {
        if (!zoneData[curIdx]) zoneData[curIdx] = emptyZoneEntry();
        lb.zoneIdx = curIdx;
        zoneData[curIdx].labels.push(lb);
      }
      renderLabels();
      const inp = inlineInput();
      inp.value = lb.text || '';
      positionInlineInput(lb);
      updateLabelOptsVisibility();
      inp.focus();
      const end = inp.value.length;
      inp.setSelectionRange(end, end);
    }

    function startTextEditAt(ll) {
      const px = labelPxDefault();
      const lb = {
        lat: ll.lat, lng: ll.lng,
        text: '',
        color: document.getElementById('labelColor').value,
        fontPx: px,
        sizeWorld: labelWorldSizeFromSlider(px, ll.lat),
        zoneIdx: curIdx
      };
      startTextEdit(lb, true);
    }

    function commitTextEdit() {
      if (!textEditSession) return;
      const { lb, isNew, startText } = textEditSession;
      syncLabelFromInput();
      const text = (lb.text || '').trim();
      inlineInput().style.display = 'none';
      textEditSession = null;
      if (!text) {
        if (isNew) {
          const idx = zoneData[curIdx].labels.indexOf(lb);
          if (idx > -1) zoneData[curIdx].labels.splice(idx, 1);
        } else {
          lb.text = startText;
        }
        renderLabels();
        return;
      }
      lb.text = sanitizeLabelText(text);
      renderLabels();
      updateLabelOptsVisibility();
      saveState(isNew ? 'Добавлена надпись' : 'Отредактирована надпись');
    }

    function cancelTextEdit() {
      if (!textEditSession) return;
      const { lb, isNew, startText } = textEditSession;
      inlineInput().style.display = 'none';
      textEditSession = null;
      if (isNew) {
        const idx = zoneData[curIdx].labels.indexOf(lb);
        if (idx > -1) zoneData[curIdx].labels.splice(idx, 1);
      } else {
        lb.text = startText;
      }
      renderLabels();
      updateLabelOptsVisibility();
    }

    function removeLabel(lb) {
      if (!confirm('Удалить надпись «' + (lb.text || '').trim() + '»?')) return;
      if (textEditSession && textEditSession.lb === lb) {
        inlineInput().style.display = 'none';
        textEditSession = null;
      }
      const zIdx = lb.zoneIdx != null ? lb.zoneIdx : curIdx;
      const labels = zoneData[zIdx]?.labels;
      if (!labels) return;
      const idx = labels.indexOf(lb);
      if (idx > -1) labels.splice(idx, 1);
      renderLabels();
      saveState('Удалена надпись');
    }

    function bindLabelMarkerEvents(m, lb) {
      const attach = () => {
        const el = m.getElement();
        if (!el) return;
        const del = el.querySelector('.map-label-del');
        if (del) del.onclick = ev => { ev.stopPropagation(); removeLabel(lb); };
      };
      m.on('add', attach);
      setTimeout(attach, 0);
    }

    function _addLabelMarker(lb) {
      const c = L.latLng(lb.lat, lb.lng);
      const m = L.marker(c, {
        icon: L.divIcon({
          className: 'label-marker',
          html: buildLabelHtml(lb),
          iconAnchor: [0, 0],
          iconSize: null
        }),
        zIndexOffset: 200,
        interactive: true
      });
      m.addTo(labelsLayer);
      lb._marker = m;
      bindLabelMarkerEvents(m, lb);

      let pressTimer = null, isDrag = false, dragStart = null;

      function restoreMapDrag() {
        if (currentTool === 'none') map.dragging.enable();
        else map.dragging.disable();
      }

      function beginDrag() {
        if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
        if (isDrag) return;
        isDrag = true;
        map.dragging.disable();
        const onMove = ev => {
          const nl = map.containerPointToLatLng(map.mouseEventToContainerPoint(ev));
          m.setLatLng(nl);
          lb.lat = nl.lat;
          lb.lng = nl.lng;
          if (textEditSession && textEditSession.lb === lb) positionInlineInput(lb);
        };
        const onUp = () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          if (isDrag) saveState('Перемещена надпись');
          isDrag = false;
          dragStart = null;
          restoreMapDrag();
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      }

      m.on('mousedown', e => {
        if (currentTool !== 'label' || e.originalEvent.button !== 0) return;
        if (e.originalEvent.target.closest('.map-label-del')) return;
        L.DomEvent.stopPropagation(e);
        if (textEditSession && textEditSession.lb !== lb) commitTextEdit();
        if (textEditSession && textEditSession.lb === lb) return;
        isDrag = false;
        dragStart = map.mouseEventToContainerPoint(e.originalEvent);
        pressTimer = setTimeout(beginDrag, LABEL_DRAG_DELAY);

        const onPreMove = ev => {
          if (!dragStart || isDrag) return;
          const pt = map.mouseEventToContainerPoint(ev);
          if (Math.hypot(pt.x - dragStart.x, pt.y - dragStart.y) >= LABEL_DRAG_THRESH) {
            document.removeEventListener('mousemove', onPreMove);
            beginDrag();
          }
        };
        const onPreUp = () => {
          document.removeEventListener('mousemove', onPreMove);
          document.removeEventListener('mouseup', onPreUp);
        };
        document.addEventListener('mousemove', onPreMove);
        document.addEventListener('mouseup', onPreUp);
      });

      m.on('mouseup', e => {
        if (currentTool !== 'label' || e.originalEvent.button !== 0) return;
        if (e.originalEvent.target.closest('.map-label-del')) return;
        L.DomEvent.stopPropagation(e);
        if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
        if (!isDrag && !(textEditSession && textEditSession.lb === lb)) startTextEdit(lb, false);
        isDrag = false;
        dragStart = null;
      });
    }

    function refreshLabelSizes() {
      (zoneData[curIdx]?.labels || []).forEach(lb => {
        if (!lb._marker) return;
        lb._marker.setIcon(L.divIcon({
          className: 'label-marker',
          html: buildLabelHtml(lb),
          iconAnchor: [0, 0],
          iconSize: null
        }));
        bindLabelMarkerEvents(lb._marker, lb);
      });
    }

    let labelPending = false;
    function scheduleLabelRefresh() {
      if (labelPending) return;
      labelPending = true;
      requestAnimationFrame(() => {
        labelPending = false;
        refreshLabelSizes();
        if (textEditSession) positionInlineInput(textEditSession.lb);
      });
    }

    function renderLabels() {
      labelsLayer.clearLayers();
      if (customPlaceMode) return;
      (zoneData[curIdx]?.labels || []).forEach(lb => {
        lb._marker = null;
        if (lb.zoneIdx == null) lb.zoneIdx = curIdx;
        _addLabelMarker(lb);
      });
    }

    function initLabelUI() {
      const inp = inlineInput();
      if (!inp) return;
      inp.addEventListener('input', syncLabelFromInput);
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); commitTextEdit(); }
        else if (e.key === 'Escape') { e.preventDefault(); cancelTextEdit(); }
        e.stopPropagation();
      });
      inp.addEventListener('mousedown', e => e.stopPropagation());

      const lc = document.getElementById('labelColor');
      if (lc) lc.addEventListener('input', () => { if (textEditSession) syncLabelFromInput(); });
      const ls = document.getElementById('labelSize');
      if (ls) ls.addEventListener('input', e => {
        const v = document.getElementById('labelSizeVal');
        if (v) v.textContent = e.target.value;
        if (textEditSession) {
          applyLabelSizeFromSlider(textEditSession.lb, labelPxDefault());
          syncLabelFromInput();
        }
      });
    }

    // ═══════ DRAW CANVAS ═══════
    const dc = document.getElementById('drawCanvas');
    const dctx = dc ? dc.getContext('2d') : null;

    function resizeCanvas() {
      if (!dc) return;
      const mc = document.getElementById('mc');
      dc.width = mc.clientWidth; dc.height = mc.clientHeight;
      reRender();
    }

    function gtaToPx(gx, gy) {
      const pt = map.latLngToContainerPoint(L.latLng(gx, gy));
      return { x: pt.x, y: pt.y };
    }

    function getPxPerUnit() {
      if (!map._loaded) {
        const z = ZONES[curIdx] || ZONES[0];
        const zoom = map.getZoom?.() ?? ZONE_VIEW_ZOOM;
        return getPxPerUnitAtZoom(zoom, z?.x ?? 0);
      }
      const c = map.getCenter();
      const p0 = map.latLngToContainerPoint(L.latLng(c.lat, c.lng));
      const p1 = map.latLngToContainerPoint(L.latLng(c.lat + 1, c.lng));
      return Math.hypot(p1.x - p0.x, p1.y - p0.y) || 1;
    }

    function brushPxSize() {
      return +document.getElementById('brushSize').value;
    }

    function brushWorldSize(px) {
      return px / getPxPerUnit();
    }

    function strokeLineWidth(worldSize) {
      return worldSize * getPxPerUnit();
    }

    let renderPending = false;
    function scheduleReRender() {
      if (renderPending) return;
      renderPending = true;
      requestAnimationFrame(() => {
        renderPending = false;
        reRender();
      });
    }

    // Draw strokes in world units — scale with zoom instantly
    function reRender() {
      if (!dctx || !dc) return;
      dctx.clearRect(0, 0, dc.width, dc.height);
      if (customPlaceMode) return;
      const strokes = (zoneData[curIdx]?.strokes) || [];
      const ppm = getPxPerUnit();
      for (let si = 0; si < strokes.length; si++) {
        const s = strokes[si];
        if (!s.points || s.points.length < 2) continue;
        const lw = s.size * ppm;
        dctx.beginPath();
        dctx.strokeStyle = s.color;
        dctx.lineWidth = lw;
        dctx.lineCap = 'round';
        dctx.lineJoin = 'round';
        const p0 = gtaToPx(s.points[0].gx, s.points[0].gy);
        dctx.moveTo(p0.x, p0.y);
        for (let pi = 1; pi < s.points.length; pi++) {
          const pp = gtaToPx(s.points[pi].gx, s.points[pi].gy);
          dctx.lineTo(pp.x, pp.y);
        }
        dctx.stroke();
      }
      if (isDrawing && currentStroke && currentStroke.points.length >= 1) {
        const lw = currentStroke.size * ppm;
        dctx.beginPath();
        dctx.strokeStyle = currentStroke.color;
        dctx.lineWidth = lw;
        dctx.lineCap = 'round';
        dctx.lineJoin = 'round';
        const pts = currentStroke.points;
        const p0 = gtaToPx(pts[0].gx, pts[0].gy);
        dctx.moveTo(p0.x, p0.y);
        for (let pi = 1; pi < pts.length; pi++) {
          const pp = gtaToPx(pts[pi].gx, pts[pi].gy);
          dctx.lineTo(pp.x, pp.y);
        }
        dctx.stroke();
      }
    }

    map.on('move zoom zoomanim moveend zoomend', () => {
      scheduleReRender();
      scheduleLabelRefresh();
    });
    window.addEventListener('resize', resizeCanvas);

    function canvasLL(e) {
      const r = dc.getBoundingClientRect();
      return map.containerPointToLatLng(L.point(e.clientX - r.left, e.clientY - r.top));
    }

    // RMB brush resize state
    let rmbResizing = false, rmbStartX = 0, rmbStartSize = 6, rmbLockX = 0, rmbLockY = 0;

    // Middle mouse pan
    let middlePanning = false, middleLastPt = null;

    function startMiddlePan(e) {
      if (e.button !== 1) return false;
      e.preventDefault();
      e.stopPropagation();
      if (middlePanning) return true;
      middlePanning = true;
      middleLastPt = map.mouseEventToContainerPoint(e);
      map.dragging.disable();
      document.body.style.cursor = 'grabbing';
      return true;
    }

    function moveMiddlePan(e) {
      if (!middlePanning || !middleLastPt) return;
      const pt = map.mouseEventToContainerPoint(e);
      panByClamped(pt.subtract(middleLastPt));
      middleLastPt = pt;
    }

    function stopMiddlePan(e) {
      if (e && e.button !== 1) return;
      middlePanning = false;
      middleLastPt = null;
      document.body.style.cursor = '';
      if (currentTool === 'none') map.dragging.enable();
    }

    function forwardWheelZoom(e) {
      if (!map.scrollWheelZoom || !map.scrollWheelZoom.enabled()) return;
      e.preventDefault();
      e.stopPropagation();
      const delta = map.options.wheelPxPerZoomLevel || 60;
      const dir = e.deltaY > 0 ? -1 : 1;
      const zoom = map.getZoom();
      const newZoom = Math.max(map.getMinZoom(), Math.min(map.getMaxZoom(), zoom + dir));
      if (newZoom === zoom) return;
      const ll = map.mouseEventToLatLng(e);
      map.setZoomAround(ll, newZoom);
    }

    if (dc) {
      dc.addEventListener('wheel', forwardWheelZoom, { passive: false });
      dc.addEventListener('mousedown', e => {
        if (startMiddlePan(e)) return;
        e.preventDefault();
        if (currentTool === 'draw' || currentTool === 'erase') {
          if (e.button === 2) {
            rmbResizing = true;
            rmbStartX = e.clientX;
            rmbStartSize = brushPxSize();
            rmbLockX = e.clientX;
            rmbLockY = e.clientY;
            return;
          }
          if (e.button === 0) {
            if (currentTool === 'erase') {
              isDrawing = true; eraseAt(canvasLL(e));
            } else {
              const ll = canvasLL(e);
              isDrawing = true;
              currentStroke = {
                color: document.getElementById('drawColor').value,
                size: brushWorldSize(brushPxSize()),
                points: [{ gx: ll.lat, gy: ll.lng }]
              };
            }
          }
        } else if (currentTool === 'label' && e.button === 0) {
          // handled via map click — canvas does not block markers in label mode
        }
      });

      dc.addEventListener('mousemove', e => {
        if (middlePanning) { moveMiddlePan(e); return; }
        if (rmbResizing) {
          const delta = e.clientX - rmbStartX;
          const newSize = Math.max(2, Math.min(50, rmbStartSize + Math.round(delta / 3)));
          document.getElementById('brushSize').value = newSize;
          document.getElementById('bsVal').textContent = newSize;
          updateCursorRing(rmbLockX, rmbLockY);
          return;
        }
        if (!isDrawing) return; e.preventDefault();
        const ll = canvasLL(e);
        if (currentTool === 'draw' && currentStroke) {
          currentStroke.points.push({ gx: ll.lat, gy: ll.lng });
          scheduleReRender();
        } else if (currentTool === 'erase') { eraseAt(ll); }
      });

      dc.addEventListener('contextmenu', e => {
        e.preventDefault();
        if (currentTool === 'draw') eraseAt(canvasLL(e));
      });

      dc.addEventListener('mouseup', e => {
        if (e.button === 1) return;
        finishStroke();
      });
      dc.addEventListener('mouseleave', e => {
        if (!rmbResizing && !middlePanning) finishStroke();
      });
    }
    inlineInput()?.addEventListener('wheel', forwardWheelZoom, { passive: false });
    const mcEl = document.getElementById('mc');
    mcEl.addEventListener('mousedown', e => {
      if (e.button === 1) startMiddlePan(e);
    }, true);
    mcEl.addEventListener('auxclick', e => { if (e.button === 1) e.preventDefault(); });

    document.addEventListener('mousemove', e => {
      if (middlePanning) moveMiddlePan(e);
    });

    document.addEventListener('mouseup', e => {
      if (e.button === 1) stopMiddlePan(e);
      if (rmbResizing && e.button === 2) { rmbResizing = false; }
    });

    map.getContainer().addEventListener('wheel', forwardWheelZoom, { passive: false });

    map.on('click', e => {
      if (currentTool === 'person') {
        if (!findPersonAt(e.latlng)) placePersonAt(e.latlng);
        return;
      }
      if (currentTool === 'climb') {
        if (!findClimbAt(e.latlng)) placeClimbAt(e.latlng);
        return;
      }
      if (currentTool === 'label') {
        const hit = findLabelAt(e.latlng);
        if (textEditSession) {
          if (hit && hit === textEditSession.lb) return;
          commitTextEdit();
          return;
        }
        if (!hit) startTextEditAt(e.latlng);
        return;
      }
      if (currentTool !== 'none') return;
      if (customPlaceMode) {
        finishCustomZoneAt(e.latlng);
        return;
      }
      if (isCustomZone(ZONES[curIdx])) return;
      const txt = `X:${e.latlng.lat.toFixed(2)} Y:${e.latlng.lng.toFixed(2)}`;
      navigator.clipboard?.writeText(txt);
    });

    map.on('contextmenu', e => {
      if (currentTool === 'person') {
        const hit = findPersonAt(e.latlng);
        if (hit) {
          L.DomEvent.preventDefault(e);
          removePerson(hit);
        }
      }
    });

    function finishStroke() {
      if (!isDrawing) return; isDrawing = false;
      if (currentTool === 'draw' && currentStroke) {
        if (currentStroke.points.length >= 2) {
          if (!zoneData[curIdx]) zoneData[curIdx] = emptyZoneEntry();
          zoneData[curIdx].strokes.push(currentStroke); saveState('Нарисовано');
        }
        currentStroke = null; scheduleReRender();
      }
    }

    function eraseAt(ll) {
      const r = brushWorldSize(brushPxSize());
      const zd = zoneData[curIdx];
      if (!zd) return;
      const before = zd.strokes.length;
      zd.strokes = zd.strokes.filter(s => !s.points.some(p =>
        Math.hypot(p.gx - ll.lat, p.gy - ll.lng) < r
      ));
      scheduleReRender();
      if (zd.strokes.length !== before) saveState('Стёрто');
    }

    function clearDrawings() {
      if (!confirm('Очистить все рисунки текущей зоны?')) return;
      if (zoneData[curIdx]) zoneData[curIdx].strokes = [];
      reRender(); saveState('Очищены рисунки');
    }
    function clearLabels() {
      if (!confirm('Удалить все надписи текущей зоны?')) return;
      if (zoneData[curIdx]) zoneData[curIdx].labels = [];
      renderLabels(); saveState('Удалены надписи');
    }

    function resetAll() {
      const z = ZONES[curIdx];
      const zoneName = z?.name || ('Зона ' + (curIdx + 1));
      if (!confirm(`⚠️ Сбросить все обозначения на карте «${zoneName}»?\nНадписи, дистанции, залазы и рисунки будут удалены.`)) return;
      cancelTextEdit();
      zoneData[curIdx] = emptyZoneEntry();
      renderPersons();
      renderLabels();
      renderClimbs();
      reRender();
      saveState('Сброс: ' + zoneName);
    }

    // ═══════ TOOLS ═══════
    function setTool(t) {
      if (t !== 'label' && textEditSession) commitTextEdit();
      if (t !== 'none') cancelCustomPlaceMode();
      currentTool = t;
      ['bt-view', 'bt-draw', 'bt-text', 'bt-person', 'bt-climb'].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.classList.remove('active', 'active-draw', 'active-text', 'active-person', 'active-climb'); }
      });
      if (t === 'none') { document.getElementById('bt-view').classList.add('active'); }
      else if (t === 'draw') { document.getElementById('bt-draw').classList.add('active-draw'); }
      else if (t === 'label') { document.getElementById('bt-text').classList.add('active-text'); }
      else if (t === 'person') { document.getElementById('bt-person').classList.add('active-person'); }
      else if (t === 'climb') { document.getElementById('bt-climb').classList.add('active-climb'); }

      // show/hide draw options
      const dopts = document.getElementById('drawOpts');
      dopts.classList.toggle('visible', t === 'draw' || t === 'erase');
      updateLabelOptsVisibility();

      const mcNode = document.getElementById('mc');
      mcNode.classList.toggle('person-tool-mode', t === 'person');
      mcNode.classList.toggle('label-tool-mode', t === 'label');
      mcNode.classList.toggle('climb-tool-mode', t === 'climb');

      dc.className = '';
      if (dc) {
        if (t === 'draw') dc.classList.add('draw-mode');
        else if (t === 'erase') dc.classList.add('erase-mode');
        else if (t === 'label') dc.classList.add('label-mode');
        else if (t === 'person') dc.classList.add('person-mode');
        else if (t === 'climb') dc.classList.add('climb-mode');
      }

      // Map panning — left drag only in view mode; middle button always pans
      if (t === 'draw' || t === 'erase' || t === 'label' || t === 'person' || t === 'climb') {
        map.dragging.disable();
      } else {
        map.dragging.enable();
      }
      map.scrollWheelZoom.enable();

      const cr = document.getElementById('cursorRing');
      cr.style.display = (t === 'draw' || t === 'erase') ? 'block' : 'none';

      renderLabels();
      renderPersons();
      renderClimbs();
    }

    document.getElementById('brushSize').addEventListener('input', e => {
      document.getElementById('bsVal').textContent = e.target.value;
    });

    function updateCursorRing(cx, cy) {
      const cr = document.getElementById('cursorRing');
      if (cr.style.display === 'none') return;
      const sz = brushPxSize();
      cr.style.width = sz + 'px';
      cr.style.height = sz + 'px';
      cr.style.left = cx + 'px';
      cr.style.top = cy + 'px';
      cr.style.borderColor = document.getElementById('drawColor').value + 'cc';
    }

    document.addEventListener('mousemove', e => {
      if (rmbResizing) {
        updateCursorRing(rmbLockX, rmbLockY);
      } else {
        updateCursorRing(e.clientX, e.clientY);
      }
    });

    document.addEventListener('keydown', e => {
      const isInlineText = e.target.id === 'inlineTextInput';
      const tag = e.target.tagName;
      if (!isInlineText && (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || e.target.isContentEditable)) return;

      if ((e.ctrlKey || e.metaKey) && !e.shiftKey && (e.code === 'KeyZ' || e.key === 'z' || e.key === 'я')) {
        e.preventDefault();
        e.stopPropagation();
        histUndo();
        return;
      }
      if ((e.ctrlKey || e.metaKey) && (e.code === 'KeyY' || (e.shiftKey && (e.code === 'KeyZ' || e.key === 'z')))) {
        e.preventDefault();
        e.stopPropagation();
        histRedo();
        return;
      }
      if (isInlineText) return;
      if (e.ctrlKey || e.metaKey || e.altKey) return;

      if (e.code === 'KeyV' || e.key === 'v' || e.key === 'м') { e.preventDefault(); setTool('none'); }
      else if (e.code === 'KeyB' || e.key === 'b' || e.key === 'и') { e.preventDefault(); setTool('draw'); }
      else if (e.code === 'KeyT' || e.key === 't' || e.key === 'е') { e.preventDefault(); setTool('label'); }
      else if (e.code === 'KeyR' || e.key === 'r' || e.key === 'к') { e.preventDefault(); setTool('person'); }
      else if (e.code === 'KeyX' || e.key === 'x' || e.key === 'ч') { e.preventDefault(); setTool('climb'); }
      else if (e.code === 'Escape') { setTool('none'); closeP(); closeYoutubeModal(); cancelTextEdit(); }
    }, true);

    document.getElementById('bt-undo').addEventListener('click', e => { e.preventDefault(); histUndo(); });
    document.getElementById('bt-redo').addEventListener('click', e => { e.preventDefault(); histRedo(); });

    document.getElementById('map').addEventListener('contextmenu', e => e.preventDefault());

    // ═══════ SIDEBAR ═══════
    function renderSB() {
      const lst = document.getElementById('zlist'); lst.innerHTML = '';
      const customCount = ZONES.filter(isCustomZone).length;
      document.getElementById('zcount').textContent = `Зоны (${STANDARD_ZONE_COUNT}${customCount ? '+' + customCount : ''})`;
      let customHeader = false;
      ZONES.forEach((z, i) => {
        if (isCustomZone(z) && !customHeader) {
          customHeader = true;
          const sep = document.createElement('div');
          sep.className = 'zi-section';
          sep.textContent = 'Свои зоны';
          lst.appendChild(sep);
        }
        const d = document.createElement('div');
        d.className = `zi ${!customPlaceMode && i === curIdx ? 'active' : ''}${isCustomZone(z) ? '' : ' zi-standard'}`;
        const editBtns = isCustomZone(z)
          ? `<button class="zrename" title="Переименовать" onclick="renameZone(event,${i})">✎</button>
      <button class="zdel" title="Удалить" onclick="deleteZone(event,${i})">✕</button>`
          : '';
        d.innerHTML = `<div class="zn">${i + 1}</div>
      <div class="zinfo">
        <div class="zname">${esc(z.name)}</div>
        <div class="zcoords">X:${z.x.toFixed(1)} Y:${z.y.toFixed(1)}</div>
      </div>${editBtns}`;
        d.addEventListener('click', () => sel(i));
        lst.appendChild(d);
      });
    }

    function renameZone(e, i) {
      e.stopPropagation();
      if (!isCustomZone(ZONES[i])) return;
      const name = prompt('Название зоны:', ZONES[i].name);
      if (!name || !name.trim()) return;
      ZONES[i].name = sanitizeZoneName(name);
      renderSB();
      saveState('Переименована зона');
    }

    function sel(i) {
      cancelTextEdit();
      cancelCustomPlaceMode(false);
      curIdx = i;
      if (!zoneData[i]) zoneData[i] = emptyZoneEntry();
      resetTimeline();
      applyZoneBounds(i);
      redrawZone(); renderPersons(); renderLabels(); renderClimbs(); reRender();
      setTool('none');
      renderSB();
      updateZoneModeUI();
      persistToLocalStorage();
    }

    function deleteZone(e, i) {
      e.stopPropagation();
      if (!isCustomZone(ZONES[i])) return;
      if (!confirm(`Удалить зону «${ZONES[i].name}»?`)) return;
      ZONES.splice(i, 1);
      const newZD = {};
      Object.keys(zoneData).forEach(k => {
        const ki = +k;
        if (ki < i) newZD[ki] = zoneData[ki];
        else if (ki > i) newZD[ki - 1] = zoneData[ki];
      });
      zoneData = newZD;
      const ni = Math.min(curIdx, Math.max(0, ZONES.length - 1));
      sel(ni); saveState('Удалена зона');
    }

    // ═══════ SAVE/EXPORT / PROFILE ═══════
    function exportPersistedState() {
      const std = {};
      for (let i = 0; i < STANDARD_ZONE_COUNT; i++) {
        const d = zoneData[i] || emptyZoneEntry();
        std[i] = sanitizeZoneEntry({
          persons: d.persons || [],
          labels: d.labels || [],
          climbs: d.climbs || []
        }, i);
      }
      const custom = [];
      for (let i = STANDARD_ZONE_COUNT; i < ZONES.length; i++) {
        const z = ZONES[i];
        if (!isCustomZone(z)) continue;
        const d = zoneData[i] || emptyZoneEntry();
        custom.push(sanitizeCustomZoneRecord({
          id: z.id,
          name: z.name,
          x: z.x,
          y: z.y,
          r1: z.r1 ?? 150,
          r2: z.r2 ?? 300,
          d: sanitizeZoneEntry({
            persons: d.persons || [],
            labels: d.labels || [],
            climbs: d.climbs || []
          }, i)
        }));
      }
      return { v: 3, std, custom: custom.filter(Boolean) };
    }

    let autosaveOk = true;

    function persistToLocalStorage() {
      try {
        persistActiveTemplate();
        autosaveOk = true;
        renderTemplateMenu();
      } catch (err) {
        autosaveOk = false;
        console.warn('Autosave failed:', err);
        setS('⚠️ Автосохранение недоступно в этом браузере');
      }
    }

    function encodeProfile(payload) {
      const json = JSON.stringify(profileToCompact(payload));
      return PROFILE_PREFIX + btoa(unescape(encodeURIComponent(json)));
    }

    function decodeProfile(code) {
      const raw = String(code || '').trim();
      if (!raw) throw new Error('Пустой код');
      if (raw.length > PROFILE_LIMITS.maxProfileChars) throw new Error('Профиль слишком большой');
      const b64 = raw.startsWith(PROFILE_PREFIX) ? raw.slice(PROFILE_PREFIX.length) : raw;
      if (!/^[A-Za-z0-9+/=]+$/.test(b64)) throw new Error('Неверный формат профиля');
      let parsed;
      try {
        parsed = JSON.parse(decodeURIComponent(escape(atob(b64))));
      } catch {
        throw new Error('Не удалось прочитать профиль');
      }
      if (parsed && (parsed.v === 2 || parsed.v === 3)) return compactToProfile(parsed);
      return sanitizeProfilePayload(parsed, true);
    }

    function applyTemplatePayload(payload, historyDesc = 'Шаблон') {
      const runtime = profileToRuntime(payload);
      cancelTextEdit();
      cancelCustomPlaceMode();
      ZONES = runtime.zones;
      zoneData = runtime.zoneData;
      curIdx = runtime.curIdx;
      if (curIdx >= ZONES.length) curIdx = 0;
      histStack = [];
      histPos = -1;
      redrawZone();
      renderPersons();
      renderLabels();
      renderClimbs();
      reRender();
      renderSB();
      if (ZONES.length) sel(curIdx);
      else updateZoneModeUI();
      pushHistory(historyDesc);
    }

    function renderTemplateMenu() {
      const menu = document.getElementById('tplMenu');
      const trigger = document.getElementById('tplTrigger');
      if (!menu || !trigger) return;
      const store = readTemplatesStore();
      const activeTpl = store.templates[store.activeId];
      trigger.textContent = (activeTpl?.name || DEFAULT_TEMPLATE_NAME) + ' ▾';
      menu.innerHTML = '';
      Object.entries(store.templates).forEach(([id, tpl]) => {
        const row = document.createElement('div');
        row.className = 'tpl-item' + (id === store.activeId ? ' active' : '');
        const pick = document.createElement('button');
        pick.type = 'button';
        pick.className = 'tpl-pick';
        pick.textContent = tpl.name || DEFAULT_TEMPLATE_NAME;
        pick.onclick = () => { closeTplMenu(); switchTemplate(id); };
        const ren = document.createElement('button');
        ren.type = 'button';
        ren.className = 'tpl-ren';
        ren.title = 'Переименовать';
        ren.textContent = '✎';
        ren.onclick = (e) => { e.stopPropagation(); renameTemplate(id); };
        const del = document.createElement('button');
        del.type = 'button';
        del.className = 'tpl-del';
        del.title = 'Удалить шаблон';
        del.textContent = '🗑';
        del.onclick = (e) => { e.stopPropagation(); deleteTemplate(id); };
        row.appendChild(pick);
        row.appendChild(ren);
        row.appendChild(del);
        menu.appendChild(row);
      });
      const imp = document.createElement('button');
      imp.type = 'button';
      imp.className = 'tpl-import';
      imp.textContent = '+ Импорт шаблона';
      imp.onclick = () => { closeTplMenu(); importTemplateDialog(); };
      menu.appendChild(imp);
    }

    function toggleTplMenu(e) {
      e?.stopPropagation();
      document.getElementById('tplDropdown')?.classList.toggle('open');
    }

    function closeTplMenu() {
      document.getElementById('tplDropdown')?.classList.remove('open');
    }

    function switchTemplate(id) {
      if (!id) return;
      const store = readTemplatesStore();
      if (!store.templates[id] || store.activeId === id) return;
      commitTextEdit();
      persistActiveTemplate();
      store.activeId = id;
      saveTemplatesStore(store);
      const tpl = store.templates[id];
      applyTemplatePayload(tpl.data || createDefaultTemplateData(), 'Шаблон: ' + (tpl.name || ''));
      renderTemplateMenu();
    }

    function renameTemplate(id) {
      const store = readTemplatesStore();
      const tpl = store.templates[id];
      if (!tpl) return;
      const name = prompt('Название шаблона:', tpl.name || DEFAULT_TEMPLATE_NAME);
      if (!name || !name.trim()) return;
      tpl.name = sanitizeTemplateName(name);
      tpl.updated = Date.now();
      saveTemplatesStore(store);
      renderTemplateMenu();
    }

    function deleteTemplate(id) {
      const store = readTemplatesStore();
      if (Object.keys(store.templates).length <= 1) {
        alert('Нельзя удалить последний шаблон');
        return;
      }
      const name = store.templates[id]?.name || 'Шаблон';
      if (!confirm(`Удалить шаблон «${name}»?`)) return;
      delete store.templates[id];
      if (store.activeId === id) {
        store.activeId = Object.keys(store.templates)[0];
        saveTemplatesStore(store);
        const tpl = store.templates[store.activeId];
        applyTemplatePayload(tpl.data || createDefaultTemplateData(), 'Шаблон: ' + (tpl.name || ''));
        renderTemplateMenu();
      } else {
        saveTemplatesStore(store);
        renderTemplateMenu();
      }
    }

    function importTemplateDialog() {
      const name = prompt('Название шаблона:');
      if (!name || !name.trim()) return;
      const code = prompt('Вставьте код шаблона (ADP1:…):');
      if (!code || !code.trim()) return;
      try {
        const payload = decodeProfile(code.trim());
        commitTextEdit();
        persistActiveTemplate();
        const store = readTemplatesStore();
        const id = 't_' + Date.now();
        const safeName = sanitizeTemplateName(name);
        store.templates[id] = { name: safeName, updated: Date.now(), data: payload };
        store.activeId = id;
        saveTemplatesStore(store);
        applyTemplatePayload(payload, 'Импорт: ' + safeName);
        renderTemplateMenu();
        setS('✅ Шаблон добавлен');
      } catch (err) {
        alert('Ошибка импорта: ' + err.message);
      }
    }

    async function shareTemplate() {
      commitTextEdit();
      persistActiveTemplate();
      const code = encodeProfile(exportPersistedState());
      try {
        await navigator.clipboard.writeText(code);
        setS('✅ Код шаблона скопирован');
      } catch {
        prompt('Скопируйте код шаблона:', code);
      }
    }

    function persistActiveTemplate() {
      const store = readTemplatesStore();
      const payload = exportPersistedState();
      payload.ui = { curIdx };
      const id = store.activeId;
      if (!store.templates[id]) {
        store.templates[id] = { name: 'Шаблон', updated: Date.now(), data: payload };
      } else {
        store.templates[id].data = payload;
        store.templates[id].updated = Date.now();
      }
      saveTemplatesStore(store);
    }

    // ═══════ TILE CACHE / PROXY ═══════
    const TILE_PROXIES = [
      u => u,
      u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
      u => 'https://corsproxy.io/?' + encodeURIComponent(u)
    ];
    const tileCache = new Map();

    function loadTileViaImage(src, useCors) {
      return new Promise(resolve => {
        const img = new Image();
        if (useCors) img.crossOrigin = 'anonymous';
        img.onload = () => resolve(img);
        img.onerror = () => resolve(null);
        img.src = src;
      });
    }

    async function loadTile(url) {
      if (tileCache.has(url)) {
        const cached = tileCache.get(url);
        if (cached) return cached;
        tileCache.delete(url);
      }
      for (const mk of TILE_PROXIES) {
        const src = mk(url);
        for (const useCors of [true, false]) {
          const img = await loadTileViaImage(src, useCors);
          if (img) {
            tileCache.set(url, img);
            return img;
          }
        }
      }
      return null;
    }

    const setS = (t, p) => {
      const el = document.getElementById('exportStatus');
      if (!el) return;
      el.textContent = p != null ? `${t} ${Math.round(p * 100)}%` : t;
      el.style.display = t ? '' : 'none';
    };

    async function renderZone(zone, zIdx, onP) {
      const outW = +document.getElementById('pngW').value || 4000;
      const outH = outW;
      const exportZoom = Math.min(MAX_ZOOM, +document.getElementById('zl').value || ZONE_VIEW_ZOOM);
      const rad = getZoneRadii(zone, true);
      const r2v = rad.r2;
      const r1v = rad.r1;
      const showR1 = rad.showR1;
      const showR2 = rad.showR2;

      const centerLl = L.latLng(zone.x, zone.y);
      const centerPt = map.project(centerLl, exportZoom);
      const capR = Math.max(r2v, r1v, 150) + 100;
      const ppm = getPxPerUnitAtZoom(exportZoom, zone.x);
      const halfPx = capR * ppm;
      const outScale = outW / (2 * halfPx);

      const txS = Math.floor((centerPt.x - halfPx) / 256), txE = Math.floor((centerPt.x + halfPx) / 256);
      const tyS = Math.floor((centerPt.y - halfPx) / 256), tyE = Math.floor((centerPt.y + halfPx) / 256);
      const total = Math.max(1, (txE - txS + 1) * (tyE - tyS + 1));
      let loaded = 0;

      const cxO = outW / 2, cyO = outH / 2;
      const oc = document.createElement('canvas');
      oc.width = outW;
      oc.height = outH;
      const ctx = oc.getContext('2d');
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.fillStyle = BGC[curLayer] || '#082732';
      ctx.fillRect(0, 0, outW, outH);

      const tiles = [];
      for (let ty = tyS; ty <= tyE; ty++) {
        for (let tx = txS; tx <= txE; tx++) {
          tiles.push({ tx, ty, url: TILE_URL[curLayer](exportZoom, tx, ty) });
        }
      }
      const tileDraw = 256 * outScale;
      const BATCH = 8;
      for (let i = 0; i < tiles.length; i += BATCH) {
        await Promise.all(tiles.slice(i, i + BATCH).map(async ({ tx, ty, url }) => {
          const img = await loadTile(url);
          loaded++;
          if (onP) onP(loaded / total * .82);
          if (!img) return;
          const drawX = cxO + (tx * 256 - centerPt.x) * outScale;
          const drawY = cyO + (ty * 256 - centerPt.y) * outScale;
          ctx.drawImage(img, drawX, drawY, tileDraw, tileDraw);
        }));
      }
      if (onP) onP(.86);

      const lw = Math.max(2, outW / 1500);

      const toPx = (gx, gy) => {
        const p = map.project(L.latLng(gx, gy), exportZoom);
        return {
          x: cxO + (p.x - centerPt.x) * outScale,
          y: cyO + (p.y - centerPt.y) * outScale
        };
      };

      if (showR2) { const rp = r2v * ppm * outScale; ctx.save(); ctx.beginPath(); ctx.arc(cxO, cyO, rp, 0, Math.PI * 2); ctx.strokeStyle = '#ff8c00'; ctx.lineWidth = lw; ctx.setLineDash([lw * 5, lw * 3]); ctx.globalAlpha = .9; ctx.stroke(); ctx.fillStyle = 'rgba(255,140,0,.04)'; ctx.fill(); ctx.restore(); }
      if (showR1) { const rp = r1v * ppm * outScale; ctx.save(); ctx.beginPath(); ctx.arc(cxO, cyO, rp, 0, Math.PI * 2); ctx.strokeStyle = '#00ccff'; ctx.lineWidth = lw; ctx.setLineDash([]); ctx.globalAlpha = .9; ctx.stroke(); ctx.fillStyle = 'rgba(0,204,255,.06)'; ctx.fill(); ctx.restore(); }

      const boxR = Math.max(10, outW / 220);
      ctx.save();
      ctx.beginPath(); ctx.arc(cxO, cyO, boxR, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(13,17,23,.85)'; ctx.fill();
      ctx.strokeStyle = '#e94560'; ctx.lineWidth = Math.max(1.5, lw * .8); ctx.stroke();
      ctx.font = `${boxR}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('📦', cxO, cyO + 1);
      ctx.restore();

      const zd = zoneData[zIdx];
      if (zd) {
        (zd.strokes || []).forEach(s => {
          if (!s.points || s.points.length < 2) return;
          ctx.beginPath(); ctx.strokeStyle = s.color;
          ctx.lineWidth = s.size * ppm * outScale;
          ctx.lineCap = 'round'; ctx.lineJoin = 'round';
          const p0 = toPx(s.points[0].gx, s.points[0].gy); ctx.moveTo(p0.x, p0.y);
          s.points.slice(1).forEach(p => { const pp = toPx(p.gx, p.gy); ctx.lineTo(pp.x, pp.y); }); ctx.stroke();
        });
        (zd.persons || []).forEach(p => {
          const { x: px, y: py } = toPx(p.lat, p.lng);
          const pr = PERSON_R * ppm * outScale;
          ctx.save(); ctx.beginPath(); ctx.arc(px, py, pr, 0, Math.PI * 2); ctx.strokeStyle = p.color; ctx.lineWidth = lw; ctx.setLineDash([lw * 3, lw * 2]); ctx.globalAlpha = .7; ctx.stroke(); ctx.fillStyle = p.color + '15'; ctx.fill();
          ctx.globalAlpha = 1; ctx.setLineDash([]);
          ctx.beginPath(); ctx.arc(px, py - pr * .35, pr * .22, 0, Math.PI * 2); ctx.fillStyle = p.color; ctx.fill();
          ctx.beginPath(); ctx.moveTo(px - pr * .28, py + pr * .3); ctx.quadraticCurveTo(px, py, px + pr * .28, py + pr * .3); ctx.fillStyle = p.color; ctx.fill();
          ctx.restore();
        });
        (zd.labels || []).forEach(lb => {
          const { x: lx, y: ly } = toPx(lb.lat, lb.lng);
          const fs = getLabelWorldSize(lb) * ppm * outScale;
          ctx.save(); ctx.font = `bold ${Math.max(8, fs)}px sans-serif`;
          const tm = ctx.measureText(lb.text);
          ctx.fillStyle = 'rgba(13,17,23,.55)'; ctx.fillRect(lx - 2, ly - fs, tm.width + 8, fs + 4);
          ctx.fillStyle = lb.color; ctx.fillText(lb.text, lx + 2, ly);
          ctx.restore();
        });
        (zd.climbs || []).forEach(cl => {
          const { x: cx, y: cy } = toPx(cl.lat, cl.lng);
          const sz = Math.max(14, outW / 120);
          ctx.save();
          ctx.fillStyle = 'rgba(13,17,23,.75)';
          ctx.strokeStyle = '#3fb950';
          ctx.lineWidth = Math.max(1.5, lw);
          ctx.fillRect(cx - sz / 2, cy - sz / 2, sz, sz);
          ctx.strokeRect(cx - sz / 2, cy - sz / 2, sz, sz);
          ctx.font = `${sz * .55}px sans-serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('🧗', cx, cy + 1);
          ctx.restore();
        });
      }
      if (onP) onP(1); return oc;
    }

    async function exportSingle() {
      const i = curIdx, z = ZONES[i];
      setS(`Загрузка: ${z.name}…`, 0);
      try {
        const oc = await renderZone(z, i, p => setS(`Загрузка: ${z.name}…`, p));
        document.getElementById('pmtitle').textContent = z.name;
        const pc = document.getElementById('pmcanv');
        pc.width = oc.width; pc.height = oc.height;
        pc.getContext('2d').drawImage(oc, 0, 0);
        document.getElementById('pmdlbtn').onclick = () => {
          const a = document.createElement('a'); a.href = pc.toDataURL('image/png');
          a.download = `airdrop_${z.name.replace(/\s+/g, '_')}.png`; a.click();
        };
        document.getElementById('pm').classList.add('open');
        setS('', null);
      } catch (err) { setS('Ошибка: ' + err.message, 0); }
    }

    function closeP() { document.getElementById('pm').classList.remove('open'); }

    let appBooted = false;

    function initApp() {
      if (appBooted) return;
      appBooted = true;
      try {
        const boot = loadInitialState();
        ZONES = boot.zones;
        zoneData = boot.zoneData;
        curIdx = boot.curIdx ?? 0;
        initLabelUI();
        map.invalidateSize();
        updateTimelineUI();
        if (ZONES.length) sel(Math.min(curIdx, ZONES.length - 1));
        else renderSB();
        resizeCanvas();
        pushHistory('Начало');
        updateUndoRedo();
        renderTemplateMenu();
        document.addEventListener('click', e => {
          if (e.target.closest('#tplDropdown')) return;
          closeTplMenu();
        });
        document.getElementById('bt-view')?.classList.add('active');
      } catch (err) {
        console.error('Init error:', err);
        appBooted = false;
        curIdx = 0;
        renderSB();
        if (ZONES.length) {
          try { applyZoneBounds(0); redrawZone(); } catch (e2) { console.error(e2); }
        }
      }
    }

    function bootApp() {
      requestAnimationFrame(initApp);
    }

    window.addEventListener('beforeunload', () => {
      if (!autosaveOk) return;
      try { persistActiveTemplate(); } catch { /* ignore */ }
    });

    window.histUndo = histUndo;
    window.histRedo = histRedo;
    window.setTool = setTool;
    window.resetAll = resetAll;
    window.renameZone = renameZone;
    window.deleteZone = deleteZone;
    window.copyZoneCoords = copyZoneCoords;
    window.startCustomZonePlacement = startCustomZonePlacement;
    window.shareTemplate = shareTemplate;
    window.toggleTplMenu = toggleTplMenu;
    window.switchTemplate = switchTemplate;
    window.renameTemplate = renameTemplate;
    window.deleteTemplate = deleteTemplate;
    window.importTemplateDialog = importTemplateDialog;
    window.closeYoutubeModal = closeYoutubeModal;
    window.openClimbVideoTab = openClimbVideoTab;
    window.onRadiusInputChange = onRadiusInputChange;
    window.redrawZone = redrawZone;
    window.exportSingle = exportSingle;
    window.startTimeline = startTimeline;
    window.stopTimeline = stopTimeline;
    window.resetTimeline = resetTimeline;
    window.closeP = closeP;
    window.onTimelineSlider = onTimelineSlider;

    // ═══════ INIT ═══════
    map.whenReady(bootApp);
    window.addEventListener('load', () => {
      map.invalidateSize();
      bootApp();
    });
  </script>
</body>
