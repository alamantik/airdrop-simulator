<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <title>GTA5 Airdrop Tool</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --sf: #161b22;
      --sf2: #1c2128;
      --bd: #30363d;
      --ac: #e94560;
      --ac2: #00ccff;
      --tx: #e6edf3;
      --mu: #8b949e;
      --ok: #3fb950
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: 'Satoshi', system-ui, sans-serif;
      background: var(--bg);
      color: var(--tx);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    /* HEADER */
    #hdr {
      background: var(--sf);
      border-bottom: 1px solid var(--bd);
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      flex-shrink: 0;
      position: relative;
      z-index: 10100
    }

    .hdr-block {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2px;
      min-height: 36px
    }

    .hdr-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap
    }

    .hdr-logo {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 700;
      color: var(--ac);
      white-space: nowrap
    }

    .sep {
      width: 1px;
      height: 22px;
      background: var(--bd);
      flex-shrink: 0
    }

    .hl {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--mu);
      font-weight: 600;
      margin-bottom: 2px
    }

    .hr {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap
    }

    select,
    input[type=number] {
      background: var(--sf2);
      border: 1px solid var(--bd);
      color: var(--tx);
      padding: 3px 6px;
      border-radius: 5px;
      font-size: 11px;
      font-family: inherit
    }

    input[type=number]:focus,
    select:focus {
      outline: none;
      border-color: var(--ac2)
    }

    .btn {
      padding: 4px 9px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all .15s;
      display: flex;
      align-items: center;
      gap: 3px;
      white-space: nowrap;
      font-family: inherit
    }

    .btn-p {
      background: var(--ac);
      color: #fff
    }

    .btn-p:hover {
      background: #c73652
    }

    .btn-s {
      background: var(--sf2);
      color: var(--tx);
      border: 1px solid var(--bd)
    }

    .btn-s:hover {
      border-color: var(--ac2);
      color: var(--ac2)
    }

    .btn-g {
      background: #1f4d24;
      color: var(--ok);
      border: 1px solid #2ea043
    }

    .btn-g:hover {
      background: #2ea043;
      color: #fff
    }

    .btn:disabled {
      opacity: .4;
      cursor: default;
      pointer-events: none
    }

    .template-bar {
      position: relative;
      align-items: stretch
    }

    .tpl-dropdown {
      position: relative;
      z-index: 10101
    }

    .tpl-trigger {
      min-width: 148px;
      max-width: 200px;
      padding: 4px 9px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--bd);
      background: var(--sf2);
      color: var(--tx);
      font-family: inherit;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .tpl-trigger:hover,
    .tpl-dropdown.open .tpl-trigger {
      border-color: var(--ac2);
      color: var(--ac2)
    }

    .tpl-menu {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      min-width: 240px;
      max-width: 320px;
      max-height: 280px;
      overflow-y: auto;
      background: var(--sf);
      border: 1px solid var(--bd);
      border-radius: 8px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, .55);
      z-index: 10102;
      padding: 4px
    }

    .tpl-dropdown.open .tpl-menu {
      display: block
    }

    .tpl-item {
      display: flex;
      align-items: center;
      gap: 4px;
      border-radius: 5px;
      margin-bottom: 2px
    }

    .tpl-item.active {
      background: rgba(0, 204, 255, .08)
    }

    .tpl-pick {
      flex: 1;
      min-width: 0;
      padding: 6px 8px;
      border: none;
      background: transparent;
      color: var(--tx);
      font-size: 11px;
      font-family: inherit;
      text-align: left;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .tpl-pick:hover {
      color: var(--ac2)
    }

    .tpl-del,
    .tpl-ren {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 5px;
      background: transparent;
      color: var(--mu);
      cursor: pointer;
      font-size: 13px;
      line-height: 1
    }

    .tpl-ren:hover {
      background: rgba(0, 204, 255, .12);
      color: var(--ac2)
    }

    .tpl-del:hover {
      background: rgba(233, 69, 96, .15);
      color: var(--ac)
    }

    .tpl-import {
      width: 100%;
      margin-top: 4px;
      padding: 7px 8px;
      border: 1px dashed var(--bd);
      border-radius: 5px;
      background: transparent;
      color: var(--ac2);
      font-size: 11px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      text-align: left
    }

    .tpl-import:hover {
      border-color: var(--ac2);
      background: rgba(0, 204, 255, .06)
    }

    .tlabel {
      font-size: 10px;
      color: var(--mu);
      display: flex;
      align-items: center;
      gap: 3px
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 55px;
      height: 3px;
      background: var(--bd);
      border-radius: 2px;
      outline: none;
      cursor: pointer
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--ac2);
      cursor: pointer
    }

    input[type=color] {
      width: 22px;
      height: 20px;
      padding: 1px;
      border-radius: 4px;
      border: 1px solid var(--bd);
      background: var(--sf2);
      cursor: pointer
    }

    input[type=checkbox] {
      accent-color: var(--ac2)
    }

    /* MAIN LAYOUT */
    #main {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
      position: relative
    }

    /* SIDEBAR */
    #sidebar {
      width: 215px;
      flex-shrink: 0;
      height: 100%;
      z-index: 600;
      background: var(--sf);
      border-right: 1px solid var(--bd);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sb-tab {
      display: none
    }

    #sbh {
      padding: 7px 10px 5px;
      border-bottom: 1px solid var(--bd);
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    #sbh h2 {
      font-size: 10px;
      font-weight: 600;
      color: var(--mu);
      text-transform: uppercase;
      letter-spacing: .06em
    }

    #zlist {
      flex: 1;
      overflow-y: auto;
      padding: 4px
    }

    #zlist::-webkit-scrollbar {
      width: 3px
    }

    #zlist::-webkit-scrollbar-thumb {
      background: var(--bd)
    }

    .zi {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 7px;
      border-radius: 5px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background .1s;
      position: relative
    }

    .zi:hover {
      background: var(--sf2)
    }

    .zi.active {
      background: rgba(233, 69, 96, .1);
      border-color: rgba(233, 69, 96, .3)
    }

    .zn {
      width: 17px;
      height: 17px;
      border-radius: 50%;
      background: var(--sf2);
      border: 1px solid var(--bd);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      flex-shrink: 0;
      color: var(--mu)
    }

    .zi.active .zn {
      background: var(--ac);
      border-color: var(--ac);
      color: #fff
    }

    .zinfo {
      flex: 1;
      min-width: 0
    }

    .zname {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      user-select: none;
      cursor: inherit
    }

    .zrename {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--mu);
      font-size: 10px;
      cursor: pointer;
      padding: 2px;
      line-height: 1;
      flex-shrink: 0;
      display: none
    }

    .zi:hover .zrename {
      display: block
    }

    .zrename:hover {
      color: var(--ac2)
    }

    .zcoords {
      font-size: 9px;
      color: var(--mu);
      font-family: monospace
    }

    .zdel {
      position: absolute;
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
      display: none;
      background: none;
      border: none;
      color: var(--ac);
      font-size: 12px;
      cursor: pointer;
      padding: 2px;
      line-height: 1
    }

    .zi:hover .zdel {
      display: block
    }

    #addzone {
      padding: 8px 10px;
      border-top: 1px solid var(--bd);
      flex-shrink: 0
    }

    #addzone input[type=text] {
      width: 100%;
      background: var(--sf2);
      border: 1px solid var(--bd);
      color: var(--tx);
      padding: 3px 6px;
      border-radius: 5px;
      font-size: 11px;
      font-family: inherit;
      margin-bottom: 4px
    }

    #addzone input[type=text]:focus {
      outline: none;
      border-color: var(--ac2)
    }

    .add-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      margin-bottom: 5px
    }

    .add-row input {
      font-size: 10px;
      min-width: 0;
      width: 100%
    }

    .add-row .add-label {
      font-size: 9px;
      color: var(--mu);
      margin-bottom: 1px
    }

    /* MAP CONTAINER */
    #mc {
      flex: 1;
      min-height: 0;
      min-width: 0;
      position: relative;
      overflow: hidden
    }

    #map {
      width: 100%;
      height: 100%;
      background: #082732
    }

    .leaflet-control-zoom {
      display: none !important
    }

    #drawCanvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 500;
      pointer-events: none
    }

    #drawCanvas.draw-mode {
      pointer-events: all;
      cursor: none
    }

    #drawCanvas.erase-mode {
      pointer-events: all;
      cursor: none
    }

    #drawCanvas.label-mode {
      pointer-events: none
    }

    #mc.label-tool-mode #map {
      cursor: text
    }

    #drawCanvas.climb-mode {
      pointer-events: none
    }

    #mc.climb-tool-mode #map {
      cursor: crosshair
    }

    #drawCanvas.person-mode {
      pointer-events: none
    }

    #mc.person-tool-mode #map {
      cursor: crosshair
    }

    #exportStatus {
      font-size: 10px;
      color: var(--mu);
      white-space: nowrap;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis
    }

    /* BOTTOM TOOLBAR (figma-style) */
    #btoolbar {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(22, 27, 34, .97);
      border: 1px solid var(--bd);
      border-radius: 14px;
      padding: 5px 8px;
      display: flex;
      align-items: center;
      gap: 5px;
      z-index: 1001;
      box-shadow: 0 4px 24px rgba(0, 0, 0, .6);
      backdrop-filter: blur(12px);
      white-space: nowrap;
    }

    .bt {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
      padding: 5px 9px;
      border-radius: 9px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--mu);
      font-family: inherit;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: .03em;
      transition: all .15s;
      min-width: 48px;
    }

    .bt:hover {
      background: rgba(255, 255, 255, .07);
      color: var(--tx)
    }

    .bt.active {
      background: rgba(0, 204, 255, .15);
      color: var(--ac2)
    }

    .bt.active-draw {
      background: rgba(233, 69, 96, .15);
      color: var(--ac)
    }

    .bt.active-text {
      background: rgba(163, 113, 247, .15);
      color: #a371f7
    }

    .bt.active-person {
      background: rgba(163, 113, 247, .15);
      color: #a371f7
    }

    .bt.active-climb {
      background: rgba(63, 185, 80, .15);
      color: var(--ok)
    }

    .bt-icon {
      font-size: 16px;
      line-height: 1
    }

    .bt-sep {
      width: 1px;
      height: 30px;
      background: var(--bd);
      flex-shrink: 0;
      margin: 0 2px
    }

    .bt-danger:hover {
      background: rgba(233, 69, 96, .15);
      color: var(--ac)
    }

    .bt-warn:hover {
      background: rgba(255, 180, 0, .1);
      color: #ffb400
    }

    .bt-undo {
      font-size: 13px
    }

    .bt-group {
      display: flex;
      align-items: center;
      gap: 5px
    }

    /* HISTORY PANEL - top right */
    #histPanel {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 700;
      background: rgba(13, 17, 23, .94);
      border: 1px solid var(--bd);
      border-radius: 12px;
      padding: 10px 12px 12px;
      min-width: 220px;
      max-width: 280px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 28px rgba(0, 0, 0, .35)
    }

    .hist-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, .06)
    }

    #histPanel h4 {
      font-size: 10px;
      color: var(--mu);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin: 0
    }

    #histCount {
      font-size: 10px;
      color: var(--ac2);
      font-family: ui-monospace, monospace;
      font-variant-numeric: tabular-nums
    }

    #histList {
      max-height: 220px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding-right: 2px
    }

    #histList::-webkit-scrollbar {
      width: 4px
    }

    #histList::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, .12);
      border-radius: 4px
    }

    .hitem {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 7px 9px;
      border-radius: 8px;
      border: 1px solid transparent;
      color: var(--tx);
      font-size: 11px;
      line-height: 1.35;
      cursor: pointer;
      transition: background .12s, border-color .12s
    }

    .hitem:hover {
      background: rgba(255, 255, 255, .05);
      border-color: rgba(255, 255, 255, .06)
    }

    .hitem.current {
      background: rgba(0, 204, 255, .1);
      border-color: rgba(0, 204, 255, .28);
      box-shadow: inset 0 0 0 1px rgba(0, 204, 255, .08)
    }

    .hitem.future {
      opacity: .45
    }

    .hitem-num {
      flex-shrink: 0;
      min-width: 18px;
      height: 18px;
      border-radius: 5px;
      background: rgba(255, 255, 255, .06);
      color: var(--mu);
      font-size: 10px;
      font-weight: 700;
      font-family: ui-monospace, monospace;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .hitem.current .hitem-num {
      background: rgba(0, 204, 255, .18);
      color: var(--ac2)
    }

    .hitem-text {
      flex: 1;
      min-width: 0;
      word-break: break-word
    }

    /* TIMELINE */
    #timelineWrap {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 700;
      background: rgba(13, 17, 23, .94);
      border: 1px solid var(--bd);
      border-radius: 12px;
      padding: 12px 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      backdrop-filter: blur(10px);
      min-width: 500px;
      max-width: 580px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .45)
    }

    #timelineWrap.running {
      border-color: rgba(63, 185, 80, .45);
      box-shadow: 0 8px 32px rgba(0, 0, 0, .45), 0 0 0 1px rgba(63, 185, 80, .12)
    }

    #customZoneBar {
      position: absolute;
      left: 12px;
      bottom: 10px;
      z-index: 1002;
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-radius: 14px;
      background: rgba(22, 27, 34, .97);
      border: 1px solid var(--bd);
      box-shadow: 0 4px 24px rgba(0, 0, 0, .6);
      backdrop-filter: blur(12px);
      white-space: nowrap
    }

    .cz-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--mu);
      margin-right: 2px
    }

    .cz-coord {
      font-size: 13px;
      font-weight: 600;
      font-family: ui-monospace, monospace;
      color: var(--tx);
      font-variant-numeric: tabular-nums
    }

    .cz-copy {
      border: none;
      border-radius: 8px;
      padding: 7px 12px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      background: rgba(0, 204, 255, .14);
      color: var(--ac2);
      transition: all .15s;
      margin-left: 4px
    }

    .cz-copy:hover {
      background: rgba(0, 204, 255, .24)
    }

    .custom-place-mode #map {
      cursor: crosshair !important
    }

    .zi-section {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--mu);
      padding: 8px 7px 4px;
      user-select: none
    }

    .zi-standard .zrename,
    .zi-standard .zdel {
      display: none !important
    }

    .tl-top {
      display: flex;
      align-items: flex-end;
      gap: 16px;
      width: 100%
    }

    .tl-phase-block,
    .tl-timer-block {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0
    }

    .tl-timer-main {
      flex: 1;
      min-width: 88px
    }

    .tl-kicker {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--mu);
      font-weight: 600;
      white-space: nowrap
    }

    #phaseLabel {
      font-size: 26px;
      font-weight: 700;
      color: var(--ac2);
      line-height: 1;
      letter-spacing: -.02em
    }

    #phaseCountdown {
      font-size: 28px;
      font-weight: 700;
      font-family: 'Satoshi', ui-monospace, monospace;
      color: #fff;
      line-height: 1;
      letter-spacing: .03em;
      font-variant-numeric: tabular-nums
    }

    #timelineVal {
      font-size: 15px;
      font-weight: 600;
      font-family: ui-monospace, monospace;
      color: var(--tx);
      font-variant-numeric: tabular-nums
    }

    .tl-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0
    }

    .tl-btn {
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 700;
      transition: all .15s;
      white-space: nowrap
    }

    .tl-btn-play {
      padding: 9px 14px;
      font-size: 12px;
      background: var(--ok);
      color: #0d1117;
      box-shadow: 0 2px 10px rgba(63, 185, 80, .25)
    }

    .tl-btn-play:hover {
      background: #5ac96e;
      transform: translateY(-1px)
    }

    .tl-btn-stop {
      padding: 9px 14px;
      font-size: 12px;
      background: var(--ac);
      color: #fff
    }

    .tl-btn-stop:hover {
      background: #c73652
    }

    .tl-btn-reset {
      padding: 9px 10px;
      font-size: 14px;
      background: var(--sf2);
      color: var(--mu);
      border: 1px solid var(--bd)
    }

    .tl-btn-reset:hover {
      color: var(--tx);
      border-color: var(--ac2)
    }

    .tl-slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%
    }

    .tl-mark {
      font-size: 10px;
      color: var(--mu);
      font-family: ui-monospace, monospace;
      min-width: 34px;
      font-variant-numeric: tabular-nums;

    .map-climb-icon {

    }

    .map-climb-del {

      width: 15px;
      height: 15px;
      border-radius: 50%;
      border: 1px solid var(--bd);

    .climb-tool-mode .map-climb-wrap.drag-mode {

    }

    .climb-tool-mode .map-climb-wrap.drag-mode:active {

    }

    #tgLink {

      bottom: 10px;

    #tgLink:hover {

    }

    #ytModal {

    #ytPreview {

    #ytPreview.no-thumb {

    #ytThumb {

    .yt-play-btn {

    .yt-play-btn svg {

    #ytClose {

    #drawOpts {

    #pm {

    #pmbox {

    #pmclose:hover {

</head>

<body>

  <div id="hdr">
    <div class="hdr-logo">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="9" r="8" stroke="#e94560" stroke-width="1.5" />
        <circle cx="9" cy="9" r="3" fill="#e94560" opacity=".3" />
        <circle cx="9" cy="9" r="1.5" fill="#e94560" />
        <path d="M9 1v2M9 15v2M1 9h2M15 9h2" stroke="#e94560" stroke-width="1.2" stroke-linecap="round" opacity=".5" />
      </svg>
      Airdrop
    </div>

    <div class="sep"></div>
    <div class="hdr-block">
      <div class="hl">Круги</div>
      <div class="hr">
        <label class="tlabel">R1<input type="number" id="r1val" value="150" min="1" style="width:48px;margin-left:3px"
            onchange="onRadiusInputChange()"></label>
        <label class="tlabel">R2<input type="number" id="r2val" value="300" min="1" style="width:48px;margin-left:3px"
            onchange="onRadiusInputChange()"></label>
        <label class="tlabel"><input type="checkbox" id="chkR1" checked onchange="redrawZone()">R1</label>
        <label class="tlabel"><input type="checkbox" id="chkR2" checked onchange="redrawZone()">R2</label>
      </div>
    </div>

    <div class="sep"></div>
    <div class="hdr-block">
      <div class="hl">Экспорт</div>
      <div class="hr">
        <select id="zl" style="width:50px">
          <option value="4">Z4</option>
          <option value="5">Z5</option>
          <option value="6">Z6</option>
          <option value="7" selected>Z7</option>
          <option value="8">Z8</option>
        </select>
        <input type="number" id="pngW" value="4000" min="256" max="12000" step="100" style="width:58px"
          title="Ширина PNG">
        <button class="btn btn-p" onclick="exportSingle()">📸 PNG</button>
      </div>
    </div>

    <div class="sep"></div>
    <div class="hdr-block">
      <div class="hl">Шаблон</div>
      <div class="hdr-actions template-bar">
        <div class="tpl-dropdown" id="tplDropdown">
          <button type="button" class="tpl-trigger" id="tplTrigger" onclick="toggleTplMenu(event)">Мой шаблон ▾</button>
          <div class="tpl-menu" id="tplMenu"></div>
        </div>
        <button class="btn btn-s" onclick="shareTemplate()" title="Скопировать код для обмена с другими">📤 Поделиться
          шаблоном</button>
      </div>
    </div>
    <span id="exportStatus" style="display:none"></span>
  </div>

  <div id="main">
    <!-- LEFT SIDEBAR (auto-hide) -->
    <div id="sidebar">
      <div id="sb-tab">ЗОНЫ</div>
      <div id="sbh">
        <h2 id="zcount">Зоны</h2>
      </div>
      <div id="zlist"></div>
      <div id="addzone">
        <div class="hl" style="margin-bottom:5px">+ Своя зона</div>
        <input type="text" id="newName" placeholder="Название">
        <button class="btn btn-s" style="width:100%;justify-content:center;margin-top:6px"
          onclick="startCustomZonePlacement()">＋ Указать на карте</button>
      </div>
    </div>

    <div id="mc">
      <div id="map"></div>
      <canvas id="drawCanvas"></canvas>

      <!-- TIMELINE (Phase 2 + Phase 3) -->
      <div id="timelineWrap">
        <div class="tl-top">
          <div class="tl-phase-block">
            <span class="tl-kicker">Фаза</span>
            <span id="phaseLabel">2</span>
          </div>
          <div class="tl-timer-block tl-timer-main">
            <span class="tl-kicker">До конца фазы</span>
            <span id="phaseCountdown">5:00</span>
          </div>
          <div class="tl-timer-block">
            <span class="tl-kicker">Прошло</span>
            <span id="timelineVal">0:00</span>
          </div>
          <div class="tl-actions">
            <button type="button" class="tl-btn tl-btn-play" id="timelinePlayBtn" onclick="startTimeline()">▶ Запустить
              симуляцию</button>
            <button type="button" class="tl-btn tl-btn-stop" id="timelineStopBtn" onclick="stopTimeline()"
              style="display:none">■ Стоп</button>
            <button type="button" class="tl-btn tl-btn-reset" onclick="resetTimeline()"
              title="Сбросить на 0:00">↺</button>
          </div>
        </div>
        <div class="tl-slider-row">
          <span class="tl-mark">0:00</span>
          <div class="tl-slider-wrap">
            <div class="tl-slider-track" id="timelineTrack" aria-hidden="true">
              <div class="tl-slider-phase2"></div>
              <div class="tl-slider-phase3"></div>
              <div class="tl-slider-progress tl-slider-progress-p2"></div>
              <div class="tl-slider-progress tl-slider-progress-p3"></div>
              <div class="tl-slider-divider"></div>
            </div>
            <input type="range" id="timelineSlider" min="0" max="900" value="0" step="10" oninput="onTimelineSlider()">
          </div>
          <span class="tl-mark tl-mark-end">15:00</span>
        </div>
      </div>

      <!-- HISTORY PANEL -->
      <div id="histPanel">
        <div class="hist-head">
          <h4>История</h4>
          <span id="histCount"></span>
        </div>
        <div id="histList"></div>
      </div>

      <!-- DRAW OPTIONS (visible when draw/erase active) -->
      <div id="drawOpts">
        <input type="color" id="drawColor" value="#ff3300" title="Цвет">
        <label class="tlabel">
          <span style="color:var(--mu);font-size:9px">Кисть:</span>
          <input type="range" id="brushSize" min="2" max="50" value="6">
          <span id="bsVal" style="min-width:16px">6</span>
        </label>
      </div>

      <!-- LABEL OPTIONS -->
      <div id="labelOpts">
        <input type="color" id="labelColor" value="#ffff00" title="Цвет текста">
        <label class="tlabel">
          <span style="color:var(--mu);font-size:9px">Размер:</span>
          <input type="range" id="labelSize" min="8" max="72" value="14">
          <span id="labelSizeVal">14</span>
        </label>
      </div>

      <input type="text" id="inlineTextInput" autocomplete="off" spellcheck="false">

      <!-- BOTTOM TOOLBAR -->
      <div id="btoolbar">
        <!-- VIEW -->
        <button class="bt active" id="bt-view" onclick="setTool('none')"
          title="Обзор (V)&#10;ЛКМ — координаты в буфер&#10;СКМ — перемещение по карте&#10;Колёсико — зум">
          <span class="bt-icon">🖱️</span>ОБЗОР
        </button>

        <div class="bt-sep"></div>

        <!-- DRAW -->
        <button class="bt" id="bt-draw" onclick="setTool('draw')"
          title="Рисовать (B)&#10;ЛКМ — рисовать&#10;ПКМ + движение — размер кисти (курсор фиксирован)&#10;СКМ — перемещение&#10;Колёсико — зум">
          <span class="bt-icon">✏️</span>РИСОВАТЬ
        </button>

        <div class="bt-sep"></div>

        <!-- TEXT -->
        <button class="bt" id="bt-text" onclick="setTool('label')"
          title="Текст (T)&#10;ЛКМ — печатать на карте&#10;ЛКМ по надписи — редактировать&#10;ПКМ по надписи — удалить&#10;СКМ — перемещение&#10;Колёсико — зум">
          <span class="bt-icon">T</span>ТЕКСТ
        </button>

        <div class="bt-sep"></div>

        <!-- Дистанция (person) -->
        <button class="bt" id="bt-person" onclick="setTool('person')"
          title="Дистанция (R)&#10;ЛКМ — поставить игрока&#10;ЛКМ по игроку — сменить цвет&#10;ПКМ по игроку — убрать&#10;СКМ — перемещение&#10;Колёсико — зум">
          <span class="bt-icon">👤</span>ДИСТАНЦИЯ
        </button>

        <div class="bt-sep"></div>

        <button class="bt" id="bt-climb" onclick="setTool('climb')"
          title="Залаз (X)&#10;ЛКМ — залаз (YouTube или .mp4)&#10;ЛКМ по залазу — видео&#10;СКМ — перемещение&#10;Колёсико — зум">
          <span class="bt-icon">🧗</span>ЗАЛАЗ
        </button>

        <div class="bt-sep"></div>

        <!-- UNDO -->
        <button class="bt bt-undo bt-warn" id="bt-undo" onclick="histUndo()" title="Отменить (Ctrl+Z)">
          <span class="bt-icon">↩</span>ОТМЕНА
        </button>

        <!-- REDO -->
        <button class="bt bt-undo bt-warn" id="bt-redo" onclick="histRedo()" title="Вернуть (Ctrl+Y)">
          <span class="bt-icon">↪</span>ВПЕРЁД
        </button>

        <div class="bt-sep"></div>

        <!-- RESET ALL -->
        <button class="bt bt-danger" onclick="resetAll()" title="Сбросить обозначения на текущей карте">
          <span class="bt-icon">🗑️</span>СБРОС
        </button>
      </div>

      <div id="customZoneBar">
        <span class="cz-label">Центр</span>

  <script>
    'use strict';
    // ═══════ GTA5 CRS ═══════
    const CS = 0.04444, COX = 157.94, COY = 341.66;
    // GTA V playable bounds (plebmasters / native coords) → center ≈ X:250 Y:1700
    const MAP_WORLD_BOUNDS = { minX: -4200, maxX: 4700, minY: -4300, maxY: 7700 };

    function getMapWorldCenter() {
      return {
        x: (MAP_WORLD_BOUNDS.minX + MAP_WORLD_BOUNDS.maxX) / 2,
        y: (MAP_WORLD_BOUNDS.minY + MAP_WORLD_BOUNDS.maxY) / 2
      };
    }
    const BGC = { realmap: '#082732', satellite: '#00367C', atlas: '#06A9D3' };
    const TILE_URL = {
      realmap: (z, x, y) => `https://maps.plebmasters.de/gta5/realmap/M${z}/mapC_${x}_${y}.png`,
      satellite: (z, x, y) => `https://maps.plebmasters.de/gta5/satellite/${z}/${x}_${y}.png`,
      atlas: (z, x, y) => `https://maps.plebmasters.de/gta5/atlas/${z}/${x}_${y}.png`
    };

    // ═══════ DEFAULT DATA ═══════
    const DEFAULT_ZONES = [
      { name: "Порт", x: 533.8417, y: -2853.9033 },
      { name: "ВЗМ", x: -94.7341, y: -2742.3428 },
      { name: "Завод гетто", x: 583.1868, y: -1886.0044 },
      { name: "Нефтевышка", x: 1547.1428, y: -2124.2637 },
      { name: "Самолёты", x: 2355.1912, y: 3160.8000 },
      { name: "Киностудия", x: -1103.4989, y: -514.2198 },
      { name: "Апельсин", x: -415.7538, y: 1572.5934 },
      { name: "Ветряки", x: 2128.0352, y: 2010.1450 },
      { name: "Стройка", x: 988.1143, y: 2373.6924 },
      { name: "Подъемник", x: 397.7407, y: 2978.6111 },
      { name: "Петля", x: 2039.1560, y: 3428.6638 },
      { name: "Альтруисты", x: -1177.1736, y: 4926.2109 },
      { name: "Крайм меды", x: 722.9143, y: 4171.5298 },
      { name: "Бочки Юнион", x: 2994.7253, y: 4402.0615 },
      { name: "Vinewood", x: 746.6374, y: 1199.8813 },
      { name: "Обсерватория", x: -414.9495, y: 1162.6285 },
      { name: "ВЗХ", x: 2770.3120, y: 1482.0264 },
      { name: "Церковь", x: -1.5429, y: -1514.5319 }
    ];

    function emptyZoneEntry(fromFile) {
      return { strokes: [], persons: [], labels: [], climbs: [] };
    }

    function normalizeZoneEntry(d, fromFile) {
      if (fromFile) {
        return {
          strokes: [],
          persons: JSON.parse(JSON.stringify(d?.persons || [])),
          labels: JSON.parse(JSON.stringify(d?.labels || [])),
          climbs: JSON.parse(JSON.stringify(d?.climbs || []))
        };
      }
      return {
        strokes: JSON.parse(JSON.stringify(d?.strokes || [])),
        persons: JSON.parse(JSON.stringify(d?.persons || [])),
        labels: JSON.parse(JSON.stringify(d?.labels || [])),
        climbs: JSON.parse(JSON.stringify(d?.climbs || []))
      };
    }

    function buildZoneDataMap(source, zoneCount, fromFile) {
      const zd = {};
      for (let i = 0; i < zoneCount; i++) {
        const raw = source?.[i] ?? source?.[String(i)];
        zd[i] = normalizeZoneEntry(raw, fromFile);
      }
      return zd;
    }

    const AUTOSAVE_KEY = 'gta5-airdrop-tool-v3-autosave';
    const TEMPLATES_STORE_KEY = 'gta5-airdrop-tool-v3-templates';
    const DEFAULT_TEMPLATE_ID = 'default';
    const DEFAULT_TEMPLATE_NAME = 'Мой шаблон';

    function normalizeTemplateNames(store) {
      Object.values(store.templates).forEach(tpl => {
        if (tpl.name === 'Стандарт' || tpl.name === 'Автосохранение') tpl.name = DEFAULT_TEMPLATE_NAME;
      });
      return store;
    }

    const STANDARD_ZONE_COUNT = DEFAULT_ZONES.length;

    function buildStandardZones() {
      return DEFAULT_ZONES.map((z, i) => ({
        id: 's' + i,
        name: z.name,
        x: z.x,
        y: z.y,
        kind: 'standard'
      }));
    }

    function isCustomZone(z) {
      return !!(z && z.kind === 'custom');
    }

    function makeCustomZone(name, x, y) {
      return {
        id: 'c' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
        name: sanitizeZoneName(name),
        x,
        y,
        kind: 'custom',
        r1: 150,
        r2: 300
      };
    }

    function newCustomZoneId() {
      return 'c' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    }

    function sanitizeCustomZoneRecord(cz) {
      const name = sanitizeZoneName(cz?.name);
      const x = sanitizeCoord(cz?.x);
      const y = sanitizeCoord(cz?.y);
      if (!name || x == null || y == null) return null;
      let r1 = Number(cz?.r1);
      let r2 = Number(cz?.r2);
      if (!Number.isFinite(r1) || r1 < 1) r1 = 150;
      if (!Number.isFinite(r2) || r2 < 1) r2 = 300;
      r1 = Math.min(r1, 5000);
      r2 = Math.min(r2, 5000);
      const idRaw = String(cz?.id || '').trim();
      const id = idRaw.slice(0, 40) || newCustomZoneId();
      const d = sanitizeZoneEntry(cz?.d || cz?.data, 0);
      return { id, name, x, y, r1, r2, d };
    }

    function emptyStdAnnotations() {
      const std = {};
      for (let i = 0; i < STANDARD_ZONE_COUNT; i++) std[i] = emptyZoneEntry();
      return std;
    }

    function profileToRuntime(payload) {
      const safe = sanitizeProfilePayload(payload, true);
      const standards = buildStandardZones();
      const zones = [...standards];
      const zd = {};
      for (let i = 0; i < standards.length; i++) {
        zd[i] = sanitizeZoneEntry(safe.std[i] ?? safe.std[String(i)], i);
      }
      (safe.custom || []).forEach(cz => {
        const idx = zones.length;
        zones.push({
          id: cz.id,
          name: cz.name,
          x: cz.x,
          y: cz.y,
          kind: 'custom',
          r1: cz.r1,
          r2: cz.r2
        });
        zd[idx] = sanitizeZoneEntry(cz.d, idx);
      });
      let curIdx = safe.ui?.curIdx ?? 0;
      if (!Number.isInteger(curIdx) || curIdx < 0 || curIdx >= zones.length) curIdx = 0;
      return { zones, zoneData: zd, curIdx };
    }

    function migrateLegacyToV3(raw, keepUi = false) {
      let zones = [];
      let zoneDataIn = {};
      if (raw.v === 2 && Array.isArray(raw.z) && Array.isArray(raw.d)) {
        zones = raw.z.map(row => {
          const [name, x, y] = row || [];
          return sanitizeZone({ name, x, y });
        }).filter(Boolean);
        raw.d.forEach((chunk, i) => {
          if (!Array.isArray(chunk) || chunk.length < 3) return;
          const [personsRaw, labelsRaw, climbsRaw] = chunk;
          zoneDataIn[i] = {
            persons: (Array.isArray(personsRaw) ? personsRaw : []).map(row => {
              const [lat, lng, colorIdx] = row || [];
              return { lat, lng, colorIdx: colorIdx != null ? colorIdx : PERSON_DEFAULT_IDX };
            }),
            labels: (Array.isArray(labelsRaw) ? labelsRaw : []).map(row => {
              const [lat, lng, text, color, fontPx] = row || [];
              return fontPx != null ? { lat, lng, text, color, fontPx } : { lat, lng, text, color };
            }),
            climbs: (Array.isArray(climbsRaw) ? climbsRaw : []).map(row => {
              const [lat, lng, url] = row || [];
              return { lat, lng, url };
            })
          };
        });
      } else {
        zones = (Array.isArray(raw.zones) ? raw.zones : [])
          .map(sanitizeZone)
          .filter(Boolean);
        zoneDataIn = raw.zoneData && typeof raw.zoneData === 'object' ? raw.zoneData : {};
      }
      const standards = buildStandardZones();
      const std = emptyStdAnnotations();
      const custom = [];
      zones.forEach((z, i) => {
        const entry = sanitizeZoneEntry(zoneDataIn[i] ?? zoneDataIn[String(i)], i);
        const stdIdx = standards.findIndex(s =>
          s.name === z.name && Math.abs(s.x - z.x) < 2 && Math.abs(s.y - z.y) < 2
        );
        if (stdIdx >= 0) std[stdIdx] = entry;
        else custom.push({ id: newCustomZoneId(), name: z.name, x: z.x, y: z.y, r1: 150, r2: 300, d: entry });
      });
      const out = { v: 3, std, custom: custom.slice(0, PROFILE_LIMITS.maxCustomZones) };
      if (keepUi && raw.ui && typeof raw.ui === 'object') {
        const ci = Number(raw.ui.curIdx);
        if (Number.isInteger(ci) && ci >= 0) out.ui = { curIdx: ci };
      }
      return out;
    }

    function createDefaultTemplateData() {
      return sanitizeProfilePayload({ v: 3, std: emptyStdAnnotations(), custom: [] }, true);
    }

    function emptyTemplatesStore() {
      return {
        activeId: DEFAULT_TEMPLATE_ID,
        templates: {
          [DEFAULT_TEMPLATE_ID]: {
            name: DEFAULT_TEMPLATE_NAME,
            updated: Date.now(),
            data: null
          }
        }
      };
    }

    function migrateOldAutosave(store) {
      try {
        const raw = localStorage.getItem(AUTOSAVE_KEY);
        if (!raw) return store;
        const payload = sanitizeProfilePayload(JSON.parse(raw), true);
        const id = 'autosave_' + Date.now();
        store.templates[id] = { name: DEFAULT_TEMPLATE_NAME, updated: Date.now(), data: payload };
        store.activeId = id;
        localStorage.removeItem(AUTOSAVE_KEY);
      } catch { /* ignore */ }
      return store;
    }

    function readTemplatesStore() {
      try {
        let raw = localStorage.getItem(TEMPLATES_STORE_KEY);
        if (!raw) {
          let store = emptyTemplatesStore();
          store.templates[DEFAULT_TEMPLATE_ID].data = createDefaultTemplateData();
          store = migrateOldAutosave(store);
          saveTemplatesStore(store);
          return store;
        }
        const store = normalizeTemplateNames(JSON.parse(raw));
        Object.values(store.templates).forEach(tpl => {
          if (tpl && typeof tpl.name === 'string') tpl.name = sanitizeTemplateName(tpl.name);
        });
        if (!store?.templates || typeof store.templates !== 'object') throw new Error('bad store');
        if (!store.templates[DEFAULT_TEMPLATE_ID]) {
          store.templates[DEFAULT_TEMPLATE_ID] = {
            name: DEFAULT_TEMPLATE_NAME,
            updated: Date.now(),
            data: createDefaultTemplateData()
          };
        }
        if (!store.templates[store.activeId]) {
          store.activeId = Object.keys(store.templates)[0] || DEFAULT_TEMPLATE_ID;
        }
        saveTemplatesStore(store);
        return store;
      } catch {
        const store = emptyTemplatesStore();
        store.templates[DEFAULT_TEMPLATE_ID].data = createDefaultTemplateData();
        saveTemplatesStore(store);
        return store;
      }
    }

    function saveTemplatesStore(store) {
      localStorage.setItem(TEMPLATES_STORE_KEY, JSON.stringify(store));
    }

    function getActiveTemplatePayload(store) {
      const tpl = store.templates[store.activeId];
      if (tpl?.data) return tpl.data;
      if (store.activeId === DEFAULT_TEMPLATE_ID) return createDefaultTemplateData();
      return createDefaultTemplateData();
    }

    function readAutosave() {
      try {
        return getActiveTemplatePayload(readTemplatesStore());
      } catch {
        return null;
      }
    }

    function loadInitialState(skipAutosave = false) {
      // __EMBED_START__
      const EMBEDDED = null;
      // __EMBED_END__
      const autosave = skipAutosave ? null : readAutosave();
      let embedded = null;
      if (EMBEDDED) {
        try { embedded = sanitizeProfilePayload(EMBEDDED, true); } catch { embedded = null; }
      }
      const source = autosave || embedded;
      if (!source) return profileToRuntime({ v: 3, std: emptyStdAnnotations(), custom: [] });
      try {
        return profileToRuntime(source);
      } catch {
        return profileToRuntime({ v: 3, std: emptyStdAnnotations(), custom: [] });
      }
    }

    let ZONES = buildStandardZones();
    let zoneData = buildZoneDataMap(null, ZONES.length, false);
    let curIdx = 0;
    let customPlaceMode = false;
    let customPlacePendingName = '';
    let curLayer = 'realmap';
    let currentTool = 'none';
    let isDrawing = false, currentStroke = null;
    const PERSON_COLORS = ['#a371f7', '#00ccff', '#ff8c00', '#3fb950', '#e94560', '#ffffff'];
    const PERSON_DEFAULT_IDX = 0;
    const PERSON_DRAG_DELAY = 80;
    const PERSON_DRAG_THRESH = 4;
    const LABEL_DRAG_DELAY = 80;
    const LABEL_DRAG_THRESH = 4;
    const PERSON_R = 129;
    const PERSON_ICON_HIT_PX = 16;
    const CLIMB_DRAG_DELAY = 80;
    const CLIMB_DRAG_THRESH = 4;
    const CLIMB_ICON_HIT_PX = 18;
    const PROFILE_PREFIX = 'ADP1:';
    const PROFILE_LIMITS = {
      maxZones: 200,
      maxCustomZones: 50,
      maxPersons: 300,
      maxLabels: 300,
      maxClimbs: 100,
      maxZoneName: 80,
      maxLabelText: 200,
      maxProfileChars: 500000
    };
    const YT_WATCH_RE = /^https:\/\/www\.youtube\.com\/watch\?v=([\w-]{11})(?:&[^#]*)?(?:#.*)?$/;
    const YT_SHORT_RE = /^https:\/\/youtu\.be\/([\w-]{11})(?:\?[^#]*)?(?:#.*)?$/;
    const MAX_ZOOM = 8;
    const ZOOM_RANGE = 5;
    const ZONE_VIEW_LEVEL = 4;
    const ZONE_VIEW_ZOOM = MAX_ZOOM - (ZONE_VIEW_LEVEL - 1);
    const LABEL_REF_ZOOM = ZONE_VIEW_ZOOM;
    let viewBounds = null;

    // ═══════ HISTORY ═══════
    const MAX_HIST = 30;
    let histStack = [], histPos = -1;

    function snapshotState() {
      const zd = {};
      Object.keys(zoneData).forEach(k => {
        const d = zoneData[k] || emptyZoneEntry();
        zd[k] = {
          strokes: JSON.parse(JSON.stringify(d.strokes || [])),
          persons: JSON.parse(JSON.stringify(d.persons || [])),
          labels: (d.labels || []).map(lb => ({
            lat: lb.lat, lng: lb.lng, text: lb.text,
            color: lb.color, sizeWorld: lb.sizeWorld, fontPx: lb.fontPx, size: lb.size,
            zoneIdx: lb.zoneIdx != null ? lb.zoneIdx : +k
          })),
          climbs: (d.climbs || []).map(c => ({
            lat: c.lat, lng: c.lng, url: c.url, videoId: c.videoId, type: c.type,
            zoneIdx: c.zoneIdx != null ? c.zoneIdx : +k
          }))
        };
      });
      return {
        zones: JSON.parse(JSON.stringify(ZONES)),
        zoneData: zd
      };
    }

    function pushHistory(desc) {
      const snap = { desc, ...snapshotState() };
      histStack = histStack.slice(0, histPos + 1);
      histStack.push(snap);
      if (histStack.length > MAX_HIST) histStack.shift();
      histPos = histStack.length - 1;
      renderHistory();
      updateUndoRedo();
    }

    function histUndo() {
      if (histPos <= 0) return;
      histPos--;
      restoreSnap(histStack[histPos]);
    }
    function histRedo() {
      if (histPos >= histStack.length - 1) return;
      histPos++;
      restoreSnap(histStack[histPos]);
    }
    function restoreSnap(snap) {
      cancelTextEdit();
      ZONES = JSON.parse(JSON.stringify(snap.zones));
      zoneData = JSON.parse(JSON.stringify(snap.zoneData));
      if (curIdx >= ZONES.length) curIdx = Math.max(0, ZONES.length - 1);
      redrawZone(); renderPersons(); renderLabels(); renderClimbs(); reRender(); renderSB();
      renderHistory(); updateUndoRedo();
      persistToLocalStorage();
    }
    function updateUndoRedo() {
      const u = document.getElementById('bt-undo');
      const r = document.getElementById('bt-redo');
      if (u) u.disabled = histPos <= 0;
      if (r) r.disabled = histPos >= histStack.length - 1;
    }
    function renderHistory() {
      const el = document.getElementById('histList');
      const counter = document.getElementById('histCount');
      if (counter) counter.textContent = histStack.length ? `${histPos + 1}/${histStack.length}` : '—';
      el.innerHTML = '';
      histStack.forEach((s, i) => {
        const d = document.createElement('div');
        d.className = 'hitem' + (i === histPos ? ' current' : i > histPos ? ' future' : '');
        d.innerHTML = `<span class="hitem-num">${i + 1}</span><span class="hitem-text">${esc(s.desc)}</span>`;
        d.title = s.desc;
        d.addEventListener('click', () => {
          if (i === histPos) return;
          histPos = i;
          restoreSnap(histStack[i]);
        });
        el.appendChild(d);
      });
      el.scrollTop = el.scrollHeight;
    }

    function saveState(desc = 'Изменение') {
      pushHistory(desc);
      persistToLocalStorage();
    }

    // ═══════ LEAFLET ═══════
    const GTA_CRS = L.extend({}, L.CRS.Simple, {
      transformation: new L.Transformation(CS, COX, -CS, COY),
      projection: { project: s => new L.Point(s.lat, s.lng), unproject: s => new L.LatLng(s.x, s.y) },
      distance: (a, b) => { const dx = b.lng - a.lng, dy = b.lat - a.lat; return Math.sqrt(dx * dx + dy * dy); },
      infinite: true
    });
    const map = L.map('map', {
      crs: GTA_CRS, minZoom: 0, maxZoom: MAX_ZOOM,
      zoomControl: false, attributionControl: false,
      scrollWheelZoom: true, maxBoundsViscosity: 1.0
    });
    const zoneLayer = L.layerGroup().addTo(map);
    const personsLayer = L.layerGroup().addTo(map);
    const labelsLayer = L.layerGroup().addTo(map);
    const climbsLayer = L.layerGroup().addTo(map);

    let tileLayer = null;
    function setTiles(src) {
      if (tileLayer) map.removeLayer(tileLayer);
      const urls = {
        realmap: 'https://maps.plebmasters.de/gta5/realmap/M{z}/mapC_{x}_{y}.png',
        satellite: 'https://maps.plebmasters.de/gta5/satellite/{z}/{x}_{y}.png',
        atlas: 'https://maps.plebmasters.de/gta5/atlas/{z}/{x}_{y}.png'
      };
      tileLayer = L.tileLayer(urls[src], {
        tileSize: 256, noWrap: true,
        errorTileUrl: 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'
      }).addTo(map);
      document.getElementById('map').style.backgroundColor = BGC[src];
    }
    setTiles('realmap');

    // ═══════ ZONE BOUNDS (square pan area = 5 zoom steps from max) ═══════
    function getMapPixelSize() {
      map.invalidateSize();
      const s = map.getSize();
      if (s.x >= 10 && s.y >= 10) return s;
      const el = map.getContainer();
      return L.point(el.clientWidth || 800, el.clientHeight || 600);
    }

    function getPxPerUnitAtZoom(zoom, lat) {
      try {
        const p0 = map.project(L.latLng(lat, 0), zoom);
        const p1 = map.project(L.latLng(lat + 1, 0), zoom);
        const ppm = Math.hypot(p1.x - p0.x, p1.y - p0.y);
        if (ppm > 0 && isFinite(ppm)) return ppm;
      } catch (e) { /* fallback below */ }
      return CS * Math.pow(2, zoom);
    }

    let viewInitialized = false;

    function centerViewOnZone(z, zoom) {
      const ll = L.latLng(z.x, z.y);
      map.setView(ll, zoom, { animate: false });
      const align = () => {
        map.invalidateSize();
        const pt = map.latLngToContainerPoint(ll);
        const sz = getMapPixelSize();
        const off = pt.subtract(L.point(sz.x / 2, sz.y / 2));
        if (Math.abs(off.x) > 0.5 || Math.abs(off.y) > 0.5) {
          map.panBy(off, { animate: false });
        }
      };
      align();
      requestAnimationFrame(align);
    }

    function applyZoneBounds(idx) {
      const z = ZONES[idx];
      if (!z) return;
      if (isCustomZone(z)) {
        applyFullMapBounds(z, ZONE_VIEW_ZOOM);
        return;
      }
      const boundsZoom = Math.max(0, MAX_ZOOM - ZOOM_RANGE);

      try { map.setMaxBounds(null); } catch (e) { map.options.maxBounds = null; }
      map.invalidateSize();

      const mapSize = getMapPixelSize();
      const ppm = getPxPerUnitAtZoom(boundsZoom, z.x);
      let half = Math.max(mapSize.x / 2, mapSize.y / 2) / ppm;
      if (!isFinite(half) || half < 200) half = 800;

      viewBounds = L.latLngBounds(
        L.latLng(z.x - half, z.y - half),
        L.latLng(z.x + half, z.y + half)
      );

      const targetZoom = ZONE_VIEW_ZOOM;

      map.setMinZoom(boundsZoom);
      map.setMaxZoom(MAX_ZOOM);
      centerViewOnZone(z, targetZoom);
      map.setMaxBounds(viewBounds);
      map.options.maxBoundsViscosity = 1.0;
      viewInitialized = true;
    }

    function applyFullMapBounds(z, zoomLevel) {
      try { map.setMaxBounds(null); } catch (e) { map.options.maxBounds = null; }
      map.invalidateSize();
      map.setMinZoom(0);
      map.setMaxZoom(MAX_ZOOM);
      viewBounds = null;
      if (zoomLevel != null && z) centerViewOnZone(z, zoomLevel);
      viewInitialized = true;
    }

    function applyCustomPlaceView() {
      try { map.setMaxBounds(null); } catch (e) { map.options.maxBounds = null; }
      map.invalidateSize();
      map.setMinZoom(0);
      map.setMaxZoom(MAX_ZOOM);
      viewBounds = null;
      centerViewOnZone(getMapWorldCenter(), 1);
      viewInitialized = true;
    }

    function syncHeaderRadiiForZone(z) {
      if (!isCustomZone(z)) return;
      document.getElementById('r1val').value = z.r1 ?? 150;
      document.getElementById('r2val').value = z.r2 ?? 300;
    }

    function syncZoneRadiiFromHeader() {
      const z = ZONES[curIdx];
      if (!isCustomZone(z)) return;
      z.r1 = Math.max(1, +document.getElementById('r1val').value || 150);
      z.r2 = Math.max(1, +document.getElementById('r2val').value || 300);
    }

    function onRadiusInputChange() {
      syncZoneRadiiFromHeader();
      redrawZone();
    }

    function getZoneRadii(z, forExport) {
      const zone = z || ZONES[curIdx];
      if (forExport) {
        if (isCustomZone(zone)) {
          const r2 = zone.r2 ?? 300;
          const r1 = zone.r1 ?? 150;
          return {
            r1,
            r2,
            showR1: document.getElementById('chkR1').checked && r1 > 0,
            showR2: document.getElementById('chkR2').checked
          };
        }
        const r2 = +document.getElementById('r2val').value || 300;
        const r1 = +document.getElementById('r1val').value || 150;
        return {
          r1,
          r2,
          showR1: document.getElementById('chkR1').checked && r1 > 0,
          showR2: document.getElementById('chkR2').checked
        };
      }
      const tl = getTimelineState(timelineSec, zone);
      const r2 = tl.showR2 ? tl.r2 : (isCustomZone(zone) ? (zone.r2 ?? 300) : (+document.getElementById('r2val').value || 300));
      const r1 = tl.showR1 ? tl.r1 : (isCustomZone(zone) ? (zone.r1 ?? 150) : (+document.getElementById('r1val').value || 150));
      return {
        r1,
        r2,
        showR1: document.getElementById('chkR1').checked && tl.showR1 && r1 > 0,
        showR2: document.getElementById('chkR2').checked && tl.showR2
      };
    }

    function updateCustomZoneBar() {
      const z = ZONES[curIdx];
      const xEl = document.getElementById('zoneCoordX');
      const yEl = document.getElementById('zoneCoordY');
      if (!xEl || !yEl || !z) return;
      xEl.textContent = 'X:' + z.x.toFixed(2);
      yEl.textContent = 'Y:' + z.y.toFixed(2);
    }

    function updateZoneModeUI() {
      const z = ZONES[curIdx];
      const custom = isCustomZone(z);
      const tl = document.getElementById('timelineWrap');
      const cz = document.getElementById('customZoneBar');
      if (customPlaceMode) {
        if (tl) tl.style.display = 'none';
        if (cz) cz.style.display = 'none';
        return;
      }
      if (tl) tl.style.display = '';
      if (cz) cz.style.display = custom ? 'flex' : 'none';
      if (custom) {
        syncHeaderRadiiForZone(z);
        updateCustomZoneBar();
      }
    }

    function clearMapForPlacement() {
      zoneLayer.clearLayers();
      personsLayer.clearLayers();
      labelsLayer.clearLayers();
      climbsLayer.clearLayers();
      if (dctx && dc) dctx.clearRect(0, 0, dc.width, dc.height);
    }

    function restoreAfterCustomPlace() {
      updateZoneModeUI();
      redrawZone();
      renderPersons();
      renderLabels();
      renderClimbs();
      reRender();
      renderSB();
    }

    async function copyZoneCoords() {
      const z = ZONES[curIdx];
      if (!z) return;
      const txt = `X:${z.x.toFixed(2)} Y:${z.y.toFixed(2)}`;
      try {
        await navigator.clipboard.writeText(txt);
        setS('✅ Координаты скопированы');
      } catch {
        prompt('Координаты:', txt);
      }
    }

    function cancelCustomPlaceMode(restore = true) {
      if (!customPlaceMode) return;
      customPlaceMode = false;
      customPlacePendingName = '';
      document.getElementById('mc')?.classList.remove('custom-place-mode');
      if (restore) restoreAfterCustomPlace();
    }

    function startCustomZonePlacement() {
      const name = document.getElementById('newName').value.trim();
      if (!name) { alert('Введите название зоны'); return; }
      if (ZONES.filter(isCustomZone).length >= PROFILE_LIMITS.maxCustomZones) {
        alert('Достигнут лимит своих зон');
        return;
      }
      customPlacePendingName = sanitizeZoneName(name);
      customPlaceMode = true;
      cancelTextEdit();
      stopTimeline();
      resetTimeline();
      applyCustomPlaceView();
      clearMapForPlacement();
      renderSB();
      updateZoneModeUI();
      setTool('none');
      document.getElementById('mc')?.classList.add('custom-place-mode');
      setS('Кликните на карте — центр новой зоны');
    }

    function finishCustomZoneAt(ll) {
      const z = makeCustomZone(customPlacePendingName, ll.lat, ll.lng);
      cancelCustomPlaceMode(false);
      document.getElementById('newName').value = '';
      ZONES.push(z);
      const idx = ZONES.length - 1;
      zoneData[idx] = emptyZoneEntry();
      sel(idx);
      saveState('Добавлена зона: ' + z.name);
      setS('✅ Зона «' + z.name + '» создана');
    }

    function bindAirdropDrag(marker, z) {
      const el = marker.getElement?.();
      if (!el) return;

      function restoreMapDrag() {
        if (currentTool === 'none') map.dragging.enable();
        else map.dragging.disable();
      }

      let pressTimer = null, isDrag = false, dragStart = null;

      function beginDrag() {
        if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
        if (isDrag) return;
        isDrag = true;
        map.dragging.disable();
        el.style.cursor = 'grabbing';
        const onMove = ev => {
          const nl = map.containerPointToLatLng(map.mouseEventToContainerPoint(ev));
          z.x = nl.lat;
          z.y = nl.lng;
          marker.setLatLng(nl);
          redrawZoneCirclesOnly(z, nl);
          updateCustomZoneBar();
        };
        const onUp = () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          if (isDrag) {
            renderSB();
            redrawZone();
            saveState('Сдвинута зона: ' + z.name);
          }
          isDrag = false;
          dragStart = null;
          el.style.cursor = currentTool === 'none' ? 'grab' : 'default';
          restoreMapDrag();
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      }

      function onDown(e) {
        if (currentTool !== 'none' || customPlaceMode) return;
        if (e.button !== 0) return;
        L.DomEvent.stopPropagation(e);
        isDrag = false;
        dragStart = map.mouseEventToContainerPoint(e);
        pressTimer = setTimeout(beginDrag, PERSON_DRAG_DELAY);
        const onPreMove = ev => {
          if (!dragStart || isDrag) return;
          const pt = map.mouseEventToContainerPoint(ev);
          if (Math.hypot(pt.x - dragStart.x, pt.y - dragStart.y) >= PERSON_DRAG_THRESH) {
            document.removeEventListener('mousemove', onPreMove);
            beginDrag();
          }
        };
        const onPreUp = () => {
          document.removeEventListener('mousemove', onPreMove);
          document.removeEventListener('mouseup', onPreUp);
          if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
          dragStart = null;
        };
        document.addEventListener('mousemove', onPreMove);
        document.addEventListener('mouseup', onPreUp);
      }

      el.addEventListener('mousedown', onDown);
      el.style.cursor = currentTool === 'none' ? 'grab' : 'default';
    }

    function redrawZoneCirclesOnly(z, c) {
      zoneLayer.eachLayer(layer => {
        if (layer instanceof L.Circle) zoneLayer.removeLayer(layer);
      });
      const rad = getZoneRadii(z);
      if (rad.showR2)
        L.circle(c, { radius: rad.r2, color: '#ff8c00', weight: 1.5, fillOpacity: .05, dashArray: '5 3' }).addTo(zoneLayer);
      if (rad.showR1)
        L.circle(c, { radius: rad.r1, color: '#00ccff', weight: 1.5, fillOpacity: .08 }).addTo(zoneLayer);
    }

    function clampLatLngToBounds(ll) {
      if (!viewBounds) return ll;
      return L.latLng(
        Math.max(viewBounds.getSouth(), Math.min(viewBounds.getNorth(), ll.lat)),
        Math.max(viewBounds.getWest(), Math.min(viewBounds.getEast(), ll.lng))
      );
    }

    function panByClamped(delta) {
      const center = map.getCenter();
      const pt = map.latLngToContainerPoint(center);
      const next = map.containerPointToLatLng(pt.subtract(delta));
      const ll = viewBounds ? clampLatLngToBounds(next) : next;
      map.setView(ll, map.getZoom(), { animate: false });
    }

    // ═══════ ZONE MARKERS ═══════
    const AIRDROP_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20">
  <circle cx="10" cy="10" r="9" fill="rgba(13,17,23,.85)" stroke="#e94560" stroke-width="1.5"/>
  <text x="10" y="14" text-anchor="middle" font-size="10">📦</text>
</svg>`;

    // ═══════ TIMELINE (Phase 2: 5min, Phase 3: 10min) ═══════
    const PHASE2_DUR = 300;
    const PHASE3_DUR = 600;
    const TIMELINE_TOTAL = 900;
    const R2_START = 300, R2_END = 150;
    const R1_START = 150, R1_END = 0;
    let timelineSec = 0;
    let timelineInterval = null;

    function formatTime(sec) {
      const s = Math.max(0, Math.floor(sec));
      return `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;
    }

    function getTimelineState(t, z) {
      const zone = z || ZONES[curIdx];
      const r2Start = isCustomZone(zone) ? (zone.r2 ?? 300) : R2_START;
      const r2End = isCustomZone(zone) ? (zone.r1 ?? 150) : R2_END;
      const r1Start = isCustomZone(zone) ? (zone.r1 ?? 150) : R1_START;
      const time = Math.max(0, Math.min(TIMELINE_TOTAL, t));
      if (time < PHASE2_DUR) {
        const p = time / PHASE2_DUR;
        return {
          phase: 2,
          r2: r2Start + (r2End - r2Start) * p,
          showR2: true,
          r1: r1Start,
          showR1: true,
          countdown: PHASE2_DUR - time
        };
      }
      const t3 = time - PHASE2_DUR;
      const p = t3 / PHASE3_DUR;
      const r1 = r1Start + (R1_END - r1Start) * p;
      return {
        phase: 3,
        r2: 0,
        showR2: false,
        r1: Math.max(0, r1),
        showR1: r1 > 0.5,
        countdown: PHASE3_DUR - t3
      };
    }

    function updateTimelineUI() {
      const st = getTimelineState(timelineSec);
      document.getElementById('phaseLabel').textContent = String(st.phase);
      document.getElementById('phaseCountdown').textContent = formatTime(st.countdown);
      document.getElementById('timelineVal').textContent = formatTime(timelineSec);
      document.getElementById('timelineSlider').value = timelineSec;
      const track = document.getElementById('timelineTrack');
      if (track) {
        const pct = (timelineSec / TIMELINE_TOTAL) * 100;
        const p2End = (PHASE2_DUR / TIMELINE_TOTAL) * 100;
        track.style.setProperty('--tl-p2', Math.min(pct, p2End).toFixed(3) + '%');
        track.style.setProperty('--tl-p3', Math.max(0, pct - p2End).toFixed(3) + '%');
      }
      const wrap = document.getElementById('timelineWrap');
      if (wrap && !timelineInterval) wrap.classList.remove('running');
      updateZoneModeUI();
    }

    function onTimelineSlider() {
      timelineSec = +document.getElementById('timelineSlider').value;
      updateTimelineUI();
      redrawZone();
    }

    function startTimeline() {
      if (timelineInterval) return;
      document.getElementById('timelinePlayBtn').style.display = 'none';
      document.getElementById('timelineStopBtn').style.display = '';
      document.getElementById('timelineWrap')?.classList.add('running');
      timelineInterval = setInterval(() => {
        if (timelineSec >= TIMELINE_TOTAL) { stopTimeline(); return; }
        timelineSec++;
        updateTimelineUI();
        redrawZone();
        if (timelineSec >= TIMELINE_TOTAL) stopTimeline();
      }, 1000);
    }

    function stopTimeline() {
      clearInterval(timelineInterval);
      timelineInterval = null;
      document.getElementById('timelinePlayBtn').style.display = '';
      document.getElementById('timelineStopBtn').style.display = 'none';
      document.getElementById('timelineWrap')?.classList.remove('running');
    }

    function resetTimeline() {
      stopTimeline();
      timelineSec = 0;
      updateTimelineUI();
      redrawZone();
    }

    function redrawZone() {
      zoneLayer.clearLayers();
      if (customPlaceMode) return;
      const z = ZONES[curIdx];
      if (!z) return;
      const c = L.latLng(z.x, z.y);
      const rad = getZoneRadii(z);
      if (rad.showR2)
        L.circle(c, { radius: rad.r2, color: '#ff8c00', weight: 1.5, fillOpacity: .05, dashArray: '5 3' }).addTo(zoneLayer);
      if (rad.showR1)
        L.circle(c, { radius: rad.r1, color: '#00ccff', weight: 1.5, fillOpacity: .08 }).addTo(zoneLayer);
      const marker = L.marker(c, { icon: L.divIcon({ className: '', html: AIRDROP_SVG, iconAnchor: [10, 10], iconSize: [20, 20] }) }).addTo(zoneLayer);
      if (isCustomZone(z)) bindAirdropDrag(marker, z);
    }

    // ═══════ PERSONS ═══════
    function makePersonIcon(color) {
      const c = sanitizeColor(color, PERSON_COLORS[PERSON_DEFAULT_IDX]);
      return L.divIcon({
        className: '',
        html: `<svg width="28" height="28" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg" style="cursor:pointer">
      <circle cx="14" cy="14" r="13" fill="rgba(13,17,23,.7)" stroke="${c}" stroke-width="1.5" stroke-dasharray="3 2" opacity=".65"/>
      <circle cx="14" cy="10" r="3.5" fill="${c}"/>
      <path d="M6 25 Q7 18 14 18 Q21 18 22 25" fill="${c}" opacity=".85"/>
    </svg>`,
        iconAnchor: [14, 14], iconSize: [28, 28]
      });
    }

    function placePersonAt(ll) {
      if (!zoneData[curIdx]) zoneData[curIdx] = emptyZoneEntry();
      const p = {
        lat: ll.lat, lng: ll.lng,
        color: PERSON_COLORS[PERSON_DEFAULT_IDX],
        colorIdx: PERSON_DEFAULT_IDX
      };
      zoneData[curIdx].persons.push(p);
      _addPersonMarker(p, zoneData[curIdx].persons.length - 1);
      saveState('Добавлен персонаж');
    }

    function removePerson(p) {
      const idx = zoneData[curIdx].persons.indexOf(p);
      if (idx > -1) zoneData[curIdx].persons.splice(idx, 1);
      renderPersons();
      saveState('Удалён персонаж');
    }

    function findPersonAt(ll) {
      const clickPt = map.latLngToContainerPoint(ll);
      const persons = zoneData[curIdx]?.persons || [];
      let hit = null, bestDist = PERSON_ICON_HIT_PX + 1;
      for (const p of persons) {
        const pp = map.latLngToContainerPoint(L.latLng(p.lat, p.lng));
        const d = Math.hypot(pp.x - clickPt.x, pp.y - clickPt.y);
        if (d <= PERSON_ICON_HIT_PX && d < bestDist) { hit = p; bestDist = d; }
      }
      return hit;
    }

    function cyclePersonColor(p) {
      p.colorIdx = (p.colorIdx + 1) % PERSON_COLORS.length;
      p.color = PERSON_COLORS[p.colorIdx];
      renderPersons();
      saveState('Цвет персонажа');
    }

    function bindPersonPointerEvents(m, ring, p) {
      let pressTimer = null, isDrag = false, dragStart = null;

      function restoreMapDrag() {
        if (currentTool === 'none') map.dragging.enable();
        else map.dragging.disable();
      }

      function beginDrag() {
        if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
        if (isDrag) return;
        isDrag = true;
        map.dragging.disable();
        const onMove = ev => {
          const nl = map.containerPointToLatLng(map.mouseEventToContainerPoint(ev));
          m.setLatLng(nl); ring.setLatLng(nl); p.lat = nl.lat; p.lng = nl.lng;
        };
        const onUp = () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          if (isDrag) saveState('Перемещён персонаж');
          isDrag = false;
          dragStart = null;
          restoreMapDrag();
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      }

      function onDown(e) {
        if (currentTool !== 'person') return;
        if (e.originalEvent.button !== 0) return;
        L.DomEvent.stopPropagation(e);
        isDrag = false;
        dragStart = map.mouseEventToContainerPoint(e.originalEvent);
        pressTimer = setTimeout(beginDrag, PERSON_DRAG_DELAY);

        const onPreMove = ev => {
          if (!dragStart || isDrag) return;
          const pt = map.mouseEventToContainerPoint(ev);
          if (Math.hypot(pt.x - dragStart.x, pt.y - dragStart.y) >= PERSON_DRAG_THRESH) {
            document.removeEventListener('mousemove', onPreMove);
            beginDrag();
          }
        };
        const onPreUp = () => {
          document.removeEventListener('mousemove', onPreMove);
          document.removeEventListener('mouseup', onPreUp);
        };
        document.addEventListener('mousemove', onPreMove);
        document.addEventListener('mouseup', onPreUp);
      }

      function onUp(e) {
        if (currentTool !== 'person') return;
        if (e.originalEvent.button !== 0) return;
        L.DomEvent.stopPropagation(e);
        if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
        if (!isDrag) cyclePersonColor(p);
        isDrag = false;
        dragStart = null;
      }

      function onCtx(e) {
        if (currentTool !== 'person') return;
        L.DomEvent.stopPropagation(e);
        L.DomEvent.preventDefault(e);
        removePerson(p);
      }

      m.on('mousedown', onDown);
      m.on('mouseup', onUp);
      m.on('contextmenu', onCtx);
    }

    function _addPersonMarker(p, pIdx) {
      const c = L.latLng(p.lat, p.lng);
      const pc = sanitizeColor(p.color, PERSON_COLORS[PERSON_DEFAULT_IDX]);
      const ring = L.circle(c, {
        radius: PERSON_R, color: pc, weight: 1.5, fillOpacity: .05,
        dashArray: '3 2', interactive: false, bubblingMouseEvents: false
      });
      ring.addTo(personsLayer);
      const m = L.marker(c, { icon: makePersonIcon(pc), draggable: false, zIndexOffset: 100, riseOnHover: true, interactive: true });
      m.addTo(personsLayer);
      bindPersonPointerEvents(m, ring, p);
    }

    function renderPersons() {
      personsLayer.clearLayers();
      if (customPlaceMode) return;
      (zoneData[curIdx]?.persons || []).forEach((p, i) => _addPersonMarker(p, i));
    }

    // ═══════ CLIMBS (Залаз) ═══════
    function parseYoutubeId(url) {
      if (!url) return null;
      const s = String(url).trim();
      let m = s.match(/(?:youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/|youtube\.com\/live\/)([\w-]{11})/);
      if (m) return m[1];
      m = s.match(/[?&]v=([\w-]{11})/);
      return m ? m[1] : null;
    }

    function parseVideoLink(url) {
      const s = String(url).trim();
      let m = s.match(YT_WATCH_RE);
      if (m) return { type: 'youtube', videoId: m[1], url: youtubeWatchUrl(m[1]) };
      m = s.match(YT_SHORT_RE);
      if (m) return { type: 'youtube', videoId: m[1], url: youtubeWatchUrl(m[1]) };
      return null;
    }

    function youtubeWatchUrl(videoId) {
      return `https://www.youtube.com/watch?v=${videoId}`;
    }

    function getClimbOpenUrl(cl) {
      const videoId = cl.videoId || parseYoutubeId(cl.url);
      if (!videoId) return null;
      return youtubeWatchUrl(videoId);
    }

    function getClimbThumbUrl(cl) {
      const videoId = cl.videoId || parseYoutubeId(cl.url);
      if (videoId) return `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
      return null;
    }

    let activeClimbUrl = null;

    function buildClimbHtml(cl) {
      const dragCls = currentTool === 'climb' ? ' drag-mode' : '';
      const delBtn = currentTool === 'climb'
        ? `<button class="map-climb-del" type="button" title="Удалить">✕</button>`
        : '';
      return `<div class="map-climb-wrap${dragCls}" title="Залаз — нажмите для видео">
        <span class="map-climb-icon">🧗</span>${delBtn}
      </div>`;
    }

    function openClimbVideoTab() {
      if (!activeClimbUrl) return;
      window.open(activeClimbUrl, '_blank', 'noopener,noreferrer');
    }

    function openClimbVideoModal(cl) {
      if (!cl) return;
      const url = getClimbOpenUrl(cl);
      if (!url) return;
      activeClimbUrl = url;
      const thumb = document.getElementById('ytThumb');
      const preview = document.getElementById('ytPreview');
      const thumbUrl = getClimbThumbUrl(cl);
      if (thumb) {
        if (thumbUrl) {
          thumb.src = thumbUrl;
          thumb.style.display = 'block';
          preview?.classList.remove('no-thumb');
        } else {
          thumb.removeAttribute('src');
          thumb.style.display = 'none';
          preview?.classList.add('no-thumb');
        }
      }
      document.getElementById('ytModal').classList.add('open');
    }

    function closeYoutubeModal() {
      activeClimbUrl = null;
      document.getElementById('ytModal').classList.remove('open');
    }

    function findClimbAt(ll) {
      const clickPt = map.latLngToContainerPoint(ll);
      const climbs = zoneData[curIdx]?.climbs || [];
      let hit = null, bestDist = CLIMB_ICON_HIT_PX + 1;
      for (const cl of climbs) {
        const cp = map.latLngToContainerPoint(L.latLng(cl.lat, cl.lng));
        const d = Math.hypot(cp.x - clickPt.x, cp.y - clickPt.y);
        if (d <= CLIMB_ICON_HIT_PX && d < bestDist) { hit = cl; bestDist = d; }
      }
      return hit;
    }

    function placeClimbAt(ll) {
      const url = prompt('Ссылка на YouTube:\nhttps://www.youtube.com/watch?v=...\nhttps://youtu.be/...');
      if (!url || !url.trim()) return;
      const parsed = parseVideoLink(url.trim());
      if (!parsed) {
        alert('Неверная ссылка.\n\nТолько YouTube:\nhttps://www.youtube.com/watch?v=VIDEO_ID\nhttps://youtu.be/VIDEO_ID');
        return;
      }
      if (!zoneData[curIdx]) zoneData[curIdx] = emptyZoneEntry();
      const cl = {
        lat: ll.lat, lng: ll.lng, url: parsed.url,
        type: 'youtube',
        videoId: parsed.videoId,
        zoneIdx: curIdx
      };
      zoneData[curIdx].climbs.push(cl);
      _addClimbMarker(cl);
      saveState('Добавлен залаз');
    }

    function removeClimb(cl) {
      if (!confirm('Удалить залаз?')) return;
      const idx = zoneData[curIdx]?.climbs?.indexOf(cl);
      if (idx > -1) zoneData[curIdx].climbs.splice(idx, 1);
      renderClimbs();
      saveState('Удалён залаз');
    }

    function bindClimbMarkerEvents(m, cl) {
      const attach = () => {
        const el = m.getElement();
        if (!el) return;
        const del = el.querySelector('.map-climb-del');
        if (del) del.onclick = ev => { ev.stopPropagation(); removeClimb(cl); };
      };
      m.on('add', attach);
      setTimeout(attach, 0);
    }

    function _addClimbMarker(cl) {
      const c = L.latLng(cl.lat, cl.lng);
      const m = L.marker(c, {
        icon: L.divIcon({
          className: 'climb-marker',
          html: buildClimbHtml(cl),
          iconAnchor: [16, 16],
          iconSize: [32, 32]
        }),
        zIndexOffset: 250,
        interactive: true
      });
      m.addTo(climbsLayer);
      cl._marker = m;
      bindClimbMarkerEvents(m, cl);

      let pressTimer = null, isDrag = false, dragStart = null;

      function restoreMapDrag() {
        if (currentTool === 'none') map.dragging.enable();
        else map.dragging.disable();
      }

      function beginDrag() {
        if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
        if (isDrag) return;
        isDrag = true;
        map.dragging.disable();
        const onMove = ev => {
          const nl = map.containerPointToLatLng(map.mouseEventToContainerPoint(ev));
          m.setLatLng(nl);
          cl.lat = nl.lat;
          cl.lng = nl.lng;
        };
        const onUp = () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          if (isDrag) saveState('Перемещён залаз');
          isDrag = false;
          dragStart = null;
          restoreMapDrag();
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      }

      m.on('mousedown', e => {
        if (e.originalEvent.button !== 0) return;
        if (e.originalEvent.target.closest('.map-climb-del')) return;
        L.DomEvent.stopPropagation(e);
        if (currentTool === 'climb') {
          isDrag = false;
          dragStart = map.mouseEventToContainerPoint(e.originalEvent);
          pressTimer = setTimeout(beginDrag, CLIMB_DRAG_DELAY);
          const onPreMove = ev => {
            if (!dragStart || isDrag) return;
            const pt = map.mouseEventToContainerPoint(ev);
            if (Math.hypot(pt.x - dragStart.x, pt.y - dragStart.y) >= CLIMB_DRAG_THRESH) {
              document.removeEventListener('mousemove', onPreMove);
              beginDrag();
            }
          };
          const onPreUp = () => {
            document.removeEventListener('mousemove', onPreMove);
            document.removeEventListener('mouseup', onPreUp);
          };
          document.addEventListener('mousemove', onPreMove);
          document.addEventListener('mouseup', onPreUp);
        }
      });

      m.on('mouseup', e => {
        if (e.originalEvent.button !== 0) return;
        if (e.originalEvent.target.closest('.map-climb-del')) return;
        L.DomEvent.stopPropagation(e);
        if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
        if (isDrag) { isDrag = false; dragStart = null; return; }
        openClimbVideoModal(cl);
      });

      m.on('click', e => {
        L.DomEvent.stopPropagation(e);
      });
    }

    function renderClimbs() {
      climbsLayer.clearLayers();
      if (customPlaceMode) return;
      (zoneData[curIdx]?.climbs || []).forEach(cl => {
        cl._marker = null;
        if (cl.zoneIdx == null) cl.zoneIdx = curIdx;
        _addClimbMarker(cl);
      });
    }

    function esc(s) {
      return String(s || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function sanitizeColor(c, fallback = '#ffffff') {
      const s = String(c || '').trim();
      if (/^#[0-9a-fA-F]{3,8}$/.test(s)) return s;
      if (PERSON_COLORS.includes(s)) return s;
      return fallback;
    }

    function sanitizeZoneName(name) {
      return String(name ?? '')
        .replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, '')
        .replace(/[<>]/g, '')
        .trim()
        .slice(0, PROFILE_LIMITS.maxZoneName);
    }

    function sanitizeLabelText(text) {
      return String(text ?? '')
        .replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, '')
        .replace(/[<>]/g, '')
        .slice(0, PROFILE_LIMITS.maxLabelText);
    }

    function sanitizeTemplateName(name) {
      return String(name ?? '')
        .replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, '')
        .replace(/[<>]/g, '')
        .trim()
        .slice(0, 60) || DEFAULT_TEMPLATE_NAME;
    }

    function sanitizeCoord(n) {
      const v = Number(n);
      return Number.isFinite(v) ? v : null;
    }

    function sanitizePerson(p, zoneIdx) {
      const lat = sanitizeCoord(p?.lat);
      const lng = sanitizeCoord(p?.lng);
      if (lat == null || lng == null) return null;
      let colorIdx = Number(p?.colorIdx);
      if (!Number.isInteger(colorIdx) || colorIdx < 0 || colorIdx >= PERSON_COLORS.length) colorIdx = PERSON_DEFAULT_IDX;
      return {
        lat, lng,
        color: PERSON_COLORS[colorIdx],
        colorIdx,
        zoneIdx
      };
    }

    function sanitizeLabel(lb, zoneIdx) {
      const lat = sanitizeCoord(lb?.lat);
      const lng = sanitizeCoord(lb?.lng);
      if (lat == null || lng == null) return null;
      const text = sanitizeLabelText(lb?.text);
      if (!text) return null;
      const color = sanitizeColor(lb?.color, '#ffff00');
      let fontPx = Number(lb?.fontPx);
      if (!Number.isFinite(fontPx)) fontPx = 14;
      fontPx = Math.max(8, Math.min(120, Math.round(fontPx)));
      let sizeWorld = Number(lb?.sizeWorld);
      if (!Number.isFinite(sizeWorld)) {
        const ppm = CS * Math.pow(2, LABEL_REF_ZOOM);
        sizeWorld = fontPx / ppm;
      }
      return { lat, lng, text, color, fontPx, sizeWorld, zoneIdx };
    }

    function sanitizeClimb(c, zoneIdx) {
      const lat = sanitizeCoord(c?.lat);
      const lng = sanitizeCoord(c?.lng);
      if (lat == null || lng == null) return null;
      const parsed = parseVideoLink(String(c?.url ?? '').trim());
      if (!parsed) return null;
      return {
        lat, lng,
        url: parsed.url,
        videoId: parsed.videoId,
        type: 'youtube',
        zoneIdx
      };
    }

    function sanitizeZoneEntry(data, zoneIdx) {
      const entry = emptyZoneEntry();
      const src = data && typeof data === 'object' ? data : {};
      entry.persons = (Array.isArray(src.persons) ? src.persons : [])
        .map(p => sanitizePerson(p, zoneIdx))
        .filter(Boolean)
        .slice(0, PROFILE_LIMITS.maxPersons);
      entry.labels = (Array.isArray(src.labels) ? src.labels : [])
        .map(lb => sanitizeLabel(lb, zoneIdx))
        .filter(Boolean)
        .slice(0, PROFILE_LIMITS.maxLabels);
      entry.climbs = (Array.isArray(src.climbs) ? src.climbs : [])
        .map(cl => sanitizeClimb(cl, zoneIdx))
        .filter(Boolean)
        .slice(0, PROFILE_LIMITS.maxClimbs);
      return entry;
    }

    function sanitizeZone(z) {
      const name = sanitizeZoneName(z?.name);
      const x = sanitizeCoord(z?.x);
      const y = sanitizeCoord(z?.y);
      if (!name || x == null || y == null) return null;
      return { name, x, y };
    }

    function sanitizeProfilePayload(raw, keepUi = false) {
      if (!raw || typeof raw !== 'object' || Array.isArray(raw)) throw new Error('Неверный профиль');
      if (raw.v === 3) return sanitizeProfileV3(raw, keepUi);
      return migrateLegacyToV3(raw, keepUi);
    }

    function sanitizeProfileV3(raw, keepUi = false) {
      const std = {};
