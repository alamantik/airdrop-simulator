<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <title>GTA5 Airdrop Tool</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --sf: #161b22;
      --sf2: #1c2128;
      --bd: #30363d;
      --ac: #e94560;
      --ac2: #00ccff;
      --tx: #e6edf3;
      --mu: #8b949e;
      --ok: #3fb950
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: 'Satoshi', system-ui, sans-serif;
      background: var(--bg);
      color: var(--tx);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    /* HEADER */
    #hdr {
      background: var(--sf);
      border-bottom: 1px solid var(--bd);
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      flex-shrink: 0;
      position: relative;
      z-index: 10100
    }

    .hdr-block {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2px;
      min-height: 36px
    }

    .hdr-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap
    }

    .hdr-logo {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 700;
      color: var(--ac);
      white-space: nowrap
    }

    .hdr-spacer {
      flex: 1 1 auto;
      min-width: 8px
    }

    #presenceStat {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
      font-size: 11px;
      color: var(--mu);
      white-space: nowrap;
      user-select: none;
      flex-shrink: 0
    }

    #presenceStat.offline .presence-dot {
      background: var(--bd);
      box-shadow: none;
      animation: none
    }

    #presenceStat.loading .presence-dot {
      background: var(--ac2);
      box-shadow: 0 0 6px rgba(0, 204, 255, .45);
      animation: presence-pulse .85s ease-in-out infinite
    }

    @keyframes presence-pulse {
      0%, 100% { opacity: .35; transform: scale(.88) }
      50% { opacity: 1; transform: scale(1) }
    }

    .presence-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--ok);
      box-shadow: 0 0 6px rgba(63, 185, 80, .55);
      flex-shrink: 0
    }

    #presenceCount {
      display: inline-block;
      box-sizing: border-box;
      min-width: 2.6ch;
      width: 2.6ch;
      text-align: center;
      color: var(--tx);
      font-weight: 700;
      font-variant-numeric: tabular-nums
    }

    .sep {
      width: 1px;
      height: 22px;
      background: var(--bd);
      flex-shrink: 0
    }

    .hl {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--mu);
      font-weight: 600;
      margin-bottom: 2px
    }

    .hr {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap
    }

    select,
    input[type=number] {
      background: var(--sf2);
      border: 1px solid var(--bd);
      color: var(--tx);
      padding: 3px 6px;
      border-radius: 5px;
      font-size: 11px;
      font-family: inherit
    }

    input[type=number]:focus,
    select:focus {
      outline: none;
      border-color: var(--ac2)
    }

    .btn {
      padding: 4px 9px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all .15s;
      display: flex;
      align-items: center;
      gap: 3px;
      white-space: nowrap;
      font-family: inherit
    }

    .btn-p {
      background: var(--ac);
      color: #fff
    }

    .btn-p:hover {
      background: #c73652
    }

    .btn-s {
      background: var(--sf2);
      color: var(--tx);
      border: 1px solid var(--bd)
    }

    .btn-s:hover {
      border-color: var(--ac2);
      color: var(--ac2)
    }

    .btn-g {
      background: #1f4d24;
      color: var(--ok);
      border: 1px solid #2ea043
    }

    .btn-g:hover {
      background: #2ea043;
      color: #fff
    }

    .btn:disabled {
      opacity: .4;
      cursor: default;
      pointer-events: none
    }

    .template-bar {
      position: relative;
      align-items: stretch
    }

    .tpl-dropdown {
      position: relative;
      z-index: 10101
    }

    .tpl-trigger {
      min-width: 148px;
      max-width: 200px;
      padding: 4px 9px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--bd);
      background: var(--sf2);
      color: var(--tx);
      font-family: inherit;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .tpl-trigger:hover,
    .tpl-dropdown.open .tpl-trigger {
      border-color: var(--ac2);
      color: var(--ac2)
    }

    .tpl-menu {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      min-width: 240px;
      max-width: 320px;
      max-height: 280px;
      overflow-y: auto;
      background: var(--sf);
      border: 1px solid var(--bd);
      border-radius: 8px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, .55);
      z-index: 10102;
      padding: 4px
    }

    .tpl-dropdown.open .tpl-menu {
      display: block
    }

    .tpl-item {
      display: flex;
      align-items: center;
      gap: 4px;
      border-radius: 5px;
      margin-bottom: 2px
    }

    .tpl-item.active {
      background: rgba(0, 204, 255, .08)
    }

    .tpl-pick {
      flex: 1;
      min-width: 0;
      padding: 6px 8px;
      border: none;
      background: transparent;
      color: var(--tx);
      font-size: 11px;
      font-family: inherit;
      text-align: left;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .tpl-pick:hover {
      color: var(--ac2)
    }

    .tpl-del,
    .tpl-ren {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 5px;
      background: transparent;
      color: var(--mu);
      cursor: pointer;
      font-size: 13px;
      line-height: 1
    }

    .tpl-ren:hover {
      background: rgba(0, 204, 255, .12);
      color: var(--ac2)
    }

    .tpl-del:hover {
      background: rgba(233, 69, 96, .15);
      color: var(--ac)
    }

    .tpl-import {
      width: 100%;
      margin-top: 4px;
      padding: 7px 8px;
      border: 1px dashed var(--bd);
      border-radius: 5px;
      background: transparent;
      color: var(--ac2);
      font-size: 11px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      text-align: left
    }

    .tpl-import:hover {
      border-color: var(--ac2);
      background: rgba(0, 204, 255, .06)
    }

    .tlabel {
      font-size: 10px;
      color: var(--mu);
      display: flex;
      align-items: center;
      gap: 3px
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 55px;
      height: 3px;
      background: var(--bd);
      border-radius: 2px;
      outline: none;
      cursor: pointer
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--ac2);
      cursor: pointer
    }

    input[type=color] {
      width: 22px;
      height: 20px;
      padding: 1px;
      border-radius: 4px;
      border: 1px solid var(--bd);
      background: var(--sf2);
      cursor: pointer
    }

    input[type=checkbox] {
      accent-color: var(--ac2)
    }

    /* MAIN LAYOUT */
    #main {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
      position: relative
    }

    /* SIDEBAR */
    #sidebar {
      width: 215px;
      flex-shrink: 0;
      height: 100%;
      z-index: 600;
      background: var(--sf);
      border-right: 1px solid var(--bd);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sb-tab {
      display: none
    }

    #sbh {
      padding: 7px 10px 5px;
      border-bottom: 1px solid var(--bd);
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    #sbh h2 {
      font-size: 10px;
      font-weight: 600;
      color: var(--mu);
      text-transform: uppercase;
      letter-spacing: .06em
    }

    #zlist {
      flex: 1;
      overflow-y: auto;
      padding: 4px
    }

    #zlist::-webkit-scrollbar {
      width: 3px
    }

    #zlist::-webkit-scrollbar-thumb {
      background: var(--bd)
    }

    .zi {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 7px;
      border-radius: 5px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background .1s;
      position: relative
    }

    .zi:hover {
      background: var(--sf2)
    }

    .zi.active {
      background: rgba(233, 69, 96, .1);
      border-color: rgba(233, 69, 96, .3)
    }

    .zn {
      width: 17px;
      height: 17px;
      border-radius: 50%;
      background: var(--sf2);
      border: 1px solid var(--bd);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      flex-shrink: 0;
      color: var(--mu)
    }

    .zi.active .zn {
      background: var(--ac);
      border-color: var(--ac);
      color: #fff
    }

    .zinfo {
      flex: 1;
      min-width: 0
    }

    .zname {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      user-select: none;
      cursor: inherit
    }

    .zrename {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--mu);
      font-size: 10px;
      cursor: pointer;
      padding: 2px;
      line-height: 1;
      flex-shrink: 0;
      display: none
    }

    .zi:hover .zrename {
      display: block
    }

    .zrename:hover {
      color: var(--ac2)
    }

    .zcoords {
      font-size: 9px;
      color: var(--mu);
      font-family: monospace
    }

    .zdel {
      position: absolute;
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
      display: none;
      background: none;
      border: none;
      color: var(--ac);
      font-size: 12px;
      cursor: pointer;
      padding: 2px;
      line-height: 1
    }

    .zi:hover .zdel {
      display: block
    }

    #addzone {
      padding: 8px 10px;
      border-top: 1px solid var(--bd);
      flex-shrink: 0
    }

    #addzone input[type=text] {
      width: 100%;
      background: var(--sf2);
      border: 1px solid var(--bd);
      color: var(--tx);
      padding: 3px 6px;
      border-radius: 5px;
      font-size: 11px;
      font-family: inherit;
      margin-bottom: 4px
    }

    #addzone input[type=text]:focus {
      outline: none;
      border-color: var(--ac2)
    }

    .add-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      margin-bottom: 5px
    }

    .add-row input {
      font-size: 10px;
      min-width: 0;
      width: 100%
    }

    .add-row .add-label {
      font-size: 9px;
      color: var(--mu);
      margin-bottom: 1px
    }

    /* MAP CONTAINER */
    #mc {
      flex: 1;
      min-height: 0;
      min-width: 0;
      position: relative;
      overflow: hidden
    }

    #map {
      width: 100%;
      height: 100%;
      background: #082732
    }

    .leaflet-control-zoom {
      display: none !important
    }

    #drawCanvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 500;
      pointer-events: none
    }

    #drawCanvas.draw-mode {
      pointer-events: all;
      cursor: none
    }

    #drawCanvas.erase-mode {
      pointer-events: all;
      cursor: none
    }

    #drawCanvas.label-mode {
      pointer-events: none
    }

    #mc.label-tool-mode #map {
      cursor: text
    }

    #drawCanvas.climb-mode {
      pointer-events: none
    }

    #mc.climb-tool-mode #map {
      cursor: crosshair
    }

    #drawCanvas.person-mode {
      pointer-events: none
    }

    #mc.person-tool-mode #map {
      cursor: crosshair
    }

    #exportStatus {
      font-size: 10px;
      color: var(--mu);
      white-space: nowrap;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis
    }

    /* BOTTOM TOOLBAR (figma-style) */
    #btoolbar {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(22, 27, 34, .97);
      border: 1px solid var(--bd);
      border-radius: 14px;
      padding: 5px 8px;
      display: flex;
      align-items: center;
      gap: 5px;
      z-index: 1001;
      box-shadow: 0 4px 24px rgba(0, 0, 0, .6);
      backdrop-filter: blur(12px);
      white-space: nowrap;
    }

    .bt {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
      padding: 5px 9px;
      border-radius: 9px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--mu);
      font-family: inherit;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: .03em;
      transition: all .15s;
      min-width: 48px;
    }

    .bt:hover {
      background: rgba(255, 255, 255, .07);
      color: var(--tx)
    }

    .bt.active {
      background: rgba(0, 204, 255, .15);
      color: var(--ac2)
    }

    .bt.active-draw {
      background: rgba(233, 69, 96, .15);
      color: var(--ac)
    }

    .bt.active-text {
      background: rgba(163, 113, 247, .15);
      color: #a371f7
    }

    .bt.active-person {
      background: rgba(163, 113, 247, .15);
      color: #a371f7
    }

    .bt.active-climb {
      background: rgba(63, 185, 80, .15);
      color: var(--ok)
    }

    .bt-icon {
      font-size: 16px;
      line-height: 1
    }

    .bt-sep {
      width: 1px;
      height: 30px;
      background: var(--bd);
      flex-shrink: 0;
      margin: 0 2px
    }

    .bt-danger:hover {
      background: rgba(233, 69, 96, .15);
      color: var(--ac)
    }

    .bt-warn:hover {
      background: rgba(255, 180, 0, .1);
      color: #ffb400
    }

    .bt-undo {
      font-size: 13px
    }

    .bt-group {
      display: flex;
      align-items: center;
      gap: 5px
    }

    /* HISTORY PANEL - top right */
    #histPanel {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 700;
      background: rgba(13, 17, 23, .94);
      border: 1px solid var(--bd);
      border-radius: 12px;
      padding: 10px 12px 12px;
      min-width: 220px;
      max-width: 280px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 28px rgba(0, 0, 0, .35)
    }

    .hist-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, .06)
    }

    #histPanel h4 {
      font-size: 10px;
      color: var(--mu);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin: 0
    }

    #histCount {
      font-size: 10px;
      color: var(--ac2);
      font-family: ui-monospace, monospace;
      font-variant-numeric: tabular-nums
    }

    #histList {
      max-height: 220px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding-right: 2px
    }

    #histList::-webkit-scrollbar {
      width: 4px
    }

    #histList::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, .12);
      border-radius: 4px
    }

    .hitem {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 7px 9px;
      border-radius: 8px;
      border: 1px solid transparent;
      color: var(--tx);
      font-size: 11px;
      line-height: 1.35;
      cursor: pointer;
      transition: background .12s, border-color .12s
    }

    .hitem:hover {
      background: rgba(255, 255, 255, .05);
      border-color: rgba(255, 255, 255, .06)
    }

    .hitem.current {
      background: rgba(0, 204, 255, .1);
      border-color: rgba(0, 204, 255, .28);
      box-shadow: inset 0 0 0 1px rgba(0, 204, 255, .08)
    }

    .hitem.future {
      opacity: .45
    }

    .hitem-num {
      flex-shrink: 0;
      min-width: 18px;
      height: 18px;
      border-radius: 5px;
      background: rgba(255, 255, 255, .06);
      color: var(--mu);
      font-size: 10px;
      font-weight: 700;
      font-family: ui-monospace, monospace;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .hitem.current .hitem-num {
      background: rgba(0, 204, 255, .18);
      color: var(--ac2)
    }

    .hitem-text {
      flex: 1;
      min-width: 0;
      word-break: break-word
    }

    /* TIMELINE */
    #timelineWrap {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 700;
      background: rgba(13, 17, 23, .94);
      border: 1px solid var(--bd);
      border-radius: 12px;
      padding: 12px 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      backdrop-filter: blur(10px);
      min-width: 500px;
      max-width: 580px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .45)
    }

    #timelineWrap.running {
      border-color: rgba(63, 185, 80, .45);
      box-shadow: 0 8px 32px rgba(0, 0, 0, .45), 0 0 0 1px rgba(63, 185, 80, .12)
    }

    #customZoneBar {
      position: absolute;
      left: 12px;
      bottom: 10px;
      z-index: 1002;
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-radius: 14px;
      background: rgba(22, 27, 34, .97);
      border: 1px solid var(--bd);
      box-shadow: 0 4px 24px rgba(0, 0, 0, .6);
      backdrop-filter: blur(12px);
      white-space: nowrap
    }

    .cz-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--mu);
      margin-right: 2px
    }

    .cz-coord {
      font-size: 13px;
      font-weight: 600;
      font-family: ui-monospace, monospace;
      color: var(--tx);
      font-variant-numeric: tabular-nums
    }

    .cz-copy {
      border: none;
      border-radius: 8px;
      padding: 7px 12px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      background: rgba(0, 204, 255, .14);
      color: var(--ac2);
      transition: all .15s;
      margin-left: 4px
    }

    .cz-copy:hover {
      background: rgba(0, 204, 255, .24)
    }

    #coordCtxMenu {
      position: fixed;
      z-index: 10150;
      display: none;
      min-width: 240px;
      background: rgba(22, 27, 34, .98);
      border: 1px solid var(--bd);
      border-radius: 10px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, .65);
      backdrop-filter: blur(12px);
      overflow: hidden;
      font-size: 12px
    }

    #coordCtxMenu.open {
      display: block
    }

    .coord-ctx-hdr {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--bd);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--mu)
    }

    .coord-ctx-pin {
      color: var(--ac);
      font-size: 12px;
      line-height: 1
    }

    .coord-ctx-coords {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 6px 14px;
      padding: 9px 12px;
      border-bottom: 1px solid var(--bd);
      font-family: ui-monospace, monospace;
      font-size: 12px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      line-height: 1.45
    }

    .coord-part {
      display: inline-flex;
      align-items: baseline;
      gap: 7px
    }

    .coord-lbl {
      letter-spacing: 0;
      font-weight: 700
    }

    .coord-val {
      font-weight: 600;
      color: var(--tx)
    }

    .coord-x .coord-lbl {
      color: #ff6b81
    }

    .coord-y .coord-lbl {
      color: #56d364
    }

    .coord-z .coord-lbl {
      color: #58d1ff
    }
